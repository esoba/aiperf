apiVersion: v1
kind: Pod
metadata:
  name: {{ include "aiperf-operator.fullname" . }}-test-crd
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aiperf-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  serviceAccountName: {{ include "aiperf-operator.serviceAccountName" . }}
  containers:
  - name: crd-check
    image: bitnami/kubectl:latest
    command: ["sh", "-c"]
    args:
    - |
      echo "Verifying AIPerfJob CRD is registered..."
      if kubectl get crd aiperfjobs.aiperf.nvidia.com > /dev/null 2>&1; then
        echo "CRD aiperfjobs.aiperf.nvidia.com is registered"
      else
        echo "CRD aiperfjobs.aiperf.nvidia.com not found"
        exit 1
      fi

      echo "Verifying CRD is serving v1alpha1..."
      VERSIONS=$(kubectl get crd aiperfjobs.aiperf.nvidia.com -o jsonpath='{.spec.versions[*].name}')
      echo "Served versions: $VERSIONS"
      if echo "$VERSIONS" | grep -q "v1alpha1"; then
        echo "v1alpha1 is served"
      else
        echo "v1alpha1 not found in served versions"
        exit 1
      fi

      echo "All CRD checks passed"
