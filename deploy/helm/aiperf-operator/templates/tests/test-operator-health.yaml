apiVersion: v1
kind: Pod
metadata:
  name: {{ include "aiperf-operator.fullname" . }}-test-health
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aiperf-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  serviceAccountName: {{ include "aiperf-operator.serviceAccountName" . }}
  containers:
  - name: health-check
    image: bitnami/kubectl:latest
    command: ["sh", "-c"]
    args:
    - |
      echo "Finding operator pod..."
      POD_IP=$(kubectl get pods -n {{ .Release.Namespace }} \
        -l "app.kubernetes.io/name={{ include "aiperf-operator.name" . }},app.kubernetes.io/instance={{ .Release.Name }}" \
        -o jsonpath='{.items[0].status.podIP}')

      if [ -z "$POD_IP" ]; then
        echo "Could not find operator pod"
        exit 1
      fi
      echo "Operator pod IP: $POD_IP"

      echo "Checking health endpoint..."
      for i in $(seq 1 10); do
        if wget -qO- --timeout=5 "http://${POD_IP}:8080/healthz" 2>/dev/null; then
          echo ""
          echo "Operator health check passed"
          exit 0
        fi
        echo "Attempt $i/10 failed, retrying in 3s..."
        sleep 3
      done
      echo "Operator health check failed after 10 attempts"
      exit 1
