{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aiperf-operator.fullname" . }}
  labels:
    {{- include "aiperf-operator.labels" . | nindent 4 }}
rules:
# CRD discovery (required by kopf)
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]

# AIPerfJob CRD - full access for operator
- apiGroups: ["aiperf.nvidia.com"]
  resources: ["aiperfjobs", "aiperfjobs/status", "aiperfjobs/finalizers"]
  verbs: ["*"]

# JobSets - create and manage benchmark job sets
- apiGroups: ["jobset.x-k8s.io"]
  resources: ["jobsets"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["jobset.x-k8s.io"]
  resources: ["jobsets/status"]
  verbs: ["get"]

# Kueue Workloads - monitor admission status for gang-scheduling
- apiGroups: ["kueue.x-k8s.io"]
  resources: ["workloads"]
  verbs: ["get", "list", "watch"]

# Jobs - monitor JobSet-created Jobs
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch"]

# ConfigMaps - store benchmark configuration
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

# Services - headless services for pod DNS
- apiGroups: [""]
  resources: ["services"]
  verbs: ["create", "delete", "get", "list", "watch"]

# Namespaces - access for AIPerfJob resources
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]

# Pods - monitor pod status and restarts
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]

# Events - emit Kubernetes events
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]

# Leases - kopf leader election
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
{{- end }}
