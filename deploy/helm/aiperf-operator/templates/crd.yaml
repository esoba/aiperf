apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: aiperfjobs.aiperf.nvidia.com
  labels:
    {{- include "aiperf-operator.labels" . | nindent 4 }}
spec:
  group: aiperf.nvidia.com
  names:
    kind: AIPerfJob
    listKind: AIPerfJobList
    plural: aiperfjobs
    singular: aiperfjob
    shortNames:
    - apj
    - aiperf
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Stage
      type: string
      jsonPath: .status.currentPhase
      description: Current benchmark stage (warmup, profiling)
    - name: Progress
      type: string
      jsonPath: .status.phases.profiling.requestsCompleted
      description: Requests completed in profiling phase
    - name: QPS
      type: number
      jsonPath: .status.phases.profiling.requestsPerSecond
      description: Requests per second in profiling phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        required:
        - spec
        properties:
          spec:
            type: object
            description: |-
              AIPerfJob specification.

              spec.benchmark: AIPerfConfig fields (models, endpoint, datasets,
              phases, sweep, etc.) in snake_case — identical to AIPerf CLI YAML.

              Top-level deployment fields (image, podTemplate, scheduling, etc.)
              use camelCase following Kubernetes API conventions.
            properties:
              image:
                type: string
                description: Container image
                default: {{ .Values.defaults.image | quote }}
              imagePullPolicy:
                type: string
                description: |-
                  Kubernetes image pull policies.

                  See https://kubernetes.io/docs/concepts/containers/images/#image-pull-policy
                enum:
                - Always
                - Never
                - IfNotPresent
              benchmark:
                type: object
                x-kubernetes-preserve-unknown-fields: true
                description: |-
                  Benchmark configuration (AIPerfConfig). Contains models, endpoint,
                  datasets, phases, and all other benchmark parameters. Uses snake_case
                  field names, identical to AIPerf CLI YAML config files.
                  Shorthand forms (e.g. models: ['name'], single-phase dict) are accepted
                  and normalized by the operator before validation.
              # -- Deployment fields (camelCase, K8s convention) ---------------
              connectionsPerWorker:
                type: integer
                description: Maximum concurrent connections each worker handles. 100 keeps the asyncio event loop responsive
                  while amortizing per-process overhead.
                default: 100
                minimum: 1
              timeoutSeconds:
                type: number
                description: Job timeout in seconds (0 = no timeout)
                default: 0
                minimum: 0
              ttlSecondsAfterFinished:
                type: integer
                description: TTL after finished (seconds)
                default: 300
              resultsTtlDays:
                type: integer
                minimum: 1
                maximum: 365
                description: Days to retain result files before cleanup
              cancel:
                type: boolean
                description: Set to true to cancel the job
                default: false
              podTemplate:
                type: object
                description: Pod template configuration
                properties:
                  env:
                    type: array
                    description: Environment variables in K8s EnvVar format
                    items:
                      type: object
                      additionalProperties: true
                  volumes:
                    type: array
                    description: Pod volumes in K8s Volume format
                    items:
                      type: object
                      additionalProperties: true
                  volumeMounts:
                    type: array
                    description: Volume mounts in K8s VolumeMount format
                    items:
                      type: object
                      additionalProperties: true
                  nodeSelector:
                    type: object
                    description: Node selector labels
                    additionalProperties:
                      type: string
                  tolerations:
                    type: array
                    description: Pod tolerations for scheduling on tainted nodes
                    items:
                      type: object
                      additionalProperties: true
                  annotations:
                    type: object
                    description: Additional pod annotations
                    additionalProperties:
                      type: string
                  labels:
                    type: object
                    description: Additional pod labels
                    additionalProperties:
                      type: string
                  imagePullSecrets:
                    type: array
                    description: Image pull secret names
                    items:
                      type: string
                  serviceAccountName:
                    type: string
                    description: Service account name for pods
              scheduling:
                type: object
                description: Kueue scheduling configuration
                properties:
                  queueName:
                    type: string
                    description: Kueue LocalQueue name for gang-scheduling
                  priorityClass:
                    type: string
                    description: Kueue WorkloadPriorityClass name for scheduling priority
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
            properties:
              observedGeneration:
                type: integer
                format: int64
                description: Generation of the spec that was last processed
              phase:
                type: string
                description: Current job phase
                enum:
                - Pending
                - Queued
                - Initializing
                - Running
                - Completed
                - Failed
                - Cancelled
              jobId:
                type: string
                description: Unique job identifier
              startTime:
                type: string
                format: date-time
                description: Time when job started
              completionTime:
                type: string
                format: date-time
                description: Time when job completed
              jobSetName:
                type: string
                description: Name of the managed JobSet
              error:
                type: string
                description: Error message if failed
              workers:
                type: object
                properties:
                  ready:
                    type: integer
                    description: Number of ready workers
                  total:
                    type: integer
                    description: Total number of workers
              phases:
                type: object
                description: Progress tracking for each benchmark phase
                additionalProperties:
                  type: object
                  description: Phase progress stats
                  x-kubernetes-preserve-unknown-fields: true
              currentPhase:
                type: string
                description: Current benchmark phase (warmup, profiling, etc)
              liveMetrics:
                type: object
                x-kubernetes-preserve-unknown-fields: true
                description: Live metrics updated during benchmark run
              serverMetrics:
                type: object
                x-kubernetes-preserve-unknown-fields: true
                description: Server-side metrics from inference server
              results:
                type: object
                x-kubernetes-preserve-unknown-fields: true
                description: Final benchmark results and metrics
              resultsPath:
                type: string
                description: Path to stored results on operator PVC
              liveSummary:
                type: object
                x-kubernetes-preserve-unknown-fields: true
                description: Live summary metrics updated during benchmark run
              summary:
                type: object
                x-kubernetes-preserve-unknown-fields: true
                description: Final summary metrics after benchmark completion
              resultsTtlDays:
                type: integer
                description: Days to retain result files before cleanup
              sweep:
                type: object
                x-kubernetes-preserve-unknown-fields: true
                description: Sweep orchestration metadata (totalVariations, trialsPerVariation, totalRuns)
              runs:
                type: object
                description: Sweep run summary counts
                properties:
                  completed:
                    type: integer
                  failed:
                    type: integer
                  active:
                    type: integer
                  pending:
                    type: integer
              runDetails:
                type: array
                description: Detailed status for each sweep run
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
              sweepResults:
                type: object
                x-kubernetes-preserve-unknown-fields: true
                description: Aggregated metrics from completed sweep runs
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                      enum:
                      - 'True'
                      - 'False'
                      - Unknown
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                description: Detailed status conditions
