apiVersion: v1
kind: Service
metadata:
  name: {{ include "aiperf-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aiperf-operator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "aiperf-operator.selectorLabels" . | nindent 4 }}
  ports:
  - name: health
    port: 8080
    targetPort: health
    protocol: TCP
  - name: results
    port: {{ .Values.resultsServer.port }}
    targetPort: results
    protocol: TCP
