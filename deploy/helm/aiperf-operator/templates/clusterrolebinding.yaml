{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aiperf-operator.fullname" . }}
  labels:
    {{- include "aiperf-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aiperf-operator.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "aiperf-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
