---
apiVersion: v1
kind: Namespace
metadata:
  name: aiperf-system
  labels:
    app: aiperf-operator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiperf-operator
  namespace: aiperf-system
  labels:
    app: aiperf-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aiperf-operator
  labels:
    app: aiperf-operator
rules:
  # CRD discovery (required by kopf)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]

  # AIPerfJob CRD management
  - apiGroups: ["aiperf.nvidia.com"]
    resources: ["aiperfjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["aiperf.nvidia.com"]
    resources: ["aiperfjobs/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["aiperf.nvidia.com"]
    resources: ["aiperfjobs/finalizers"]
    verbs: ["update"]

  # ConfigMap management for job configs
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Pod monitoring for status checks
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  # Service management (if needed for internal communication)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete"]

  # JobSet management
  - apiGroups: ["jobset.x-k8s.io"]
    resources: ["jobsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["jobset.x-k8s.io"]
    resources: ["jobsets/status"]
    verbs: ["get"]

  # Job monitoring (JobSet creates Jobs)
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]

  # Event creation for status reporting
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  # Namespace access (for AIPerfJob resources)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]

  # Leases - kopf leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aiperf-operator
  labels:
    app: aiperf-operator
subjects:
  - kind: ServiceAccount
    name: aiperf-operator
    namespace: aiperf-system
roleRef:
  kind: ClusterRole
  name: aiperf-operator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiperf-operator
  namespace: aiperf-system
  labels:
    app: aiperf-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiperf-operator
  strategy:
    type: Recreate  # Only one operator instance should run at a time
  template:
    metadata:
      labels:
        app: aiperf-operator
    spec:
      serviceAccountName: aiperf-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: aiperf-operator:latest
          imagePullPolicy: IfNotPresent
          command:
            - kopf
            - run
            - -m
            - aiperf.operator.main
            - --verbose
            - --all-namespaces
            - --liveness=http://0.0.0.0:8080/healthz
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: AIPERF_OPERATOR_MONITOR_INTERVAL
              value: "10.0"
            - name: AIPERF_OPERATOR_MONITOR_INITIAL_DELAY
              value: "5.0"
            - name: AIPERF_RESULTS_DIR
              value: "/data"
            - name: AIPERF_JOB_TIMEOUT_SECONDS
              value: "0"
            - name: AIPERF_POD_RESTART_THRESHOLD
              value: "3"
            - name: AIPERF_RESULTS_TTL_DAYS
              value: "30"
            - name: AIPERF_RESULTS_MAX_RETRIES
              value: "5"
            - name: AIPERF_RESULTS_RETRY_DELAY
              value: "2.0"
            - name: AIPERF_ENDPOINT_CHECK_TIMEOUT
              value: "10.0"
            - name: AIPERF_DEFAULT_IMAGE
              value: "nvcr.io/nvidia/aiperf:latest"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: results
              mountPath: /data
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: aiperf-operator-results
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aiperf-operator-results
  namespace: aiperf-system
  labels:
    app: aiperf-operator
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Ti
