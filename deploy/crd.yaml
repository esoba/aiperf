---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: aiperfjobs.aiperf.nvidia.com
spec:
  group: aiperf.nvidia.com
  names:
    kind: AIPerfJob
    listKind: AIPerfJobList
    plural: aiperfjobs
    singular: aiperfjob
    shortNames:
    - apj
    - aiperf
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Stage
      type: string
      jsonPath: .status.currentPhase
      description: Current benchmark stage (warmup, profiling)
    - name: Progress
      type: string
      jsonPath: .status.phases.profiling.requestsCompleted
      description: Requests completed in profiling phase
    - name: QPS
      type: number
      jsonPath: .status.phases.profiling.requestsPerSecond
      description: Requests per second in profiling phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        required:
        - spec
        properties:
          spec:
            type: object
            properties:
              image:
                type: string
                description: AIPerf container image
                default: nvcr.io/nvidia/aiperf:latest
              imagePullPolicy:
                type: string
                description: Image pull policy (Always, Never, IfNotPresent)
                enum:
                - Always
                - Never
                - IfNotPresent
              models:
                type: object
                description: Model configuration. Accepts a single model name string, a list of model names, or an advanced
                  configuration with strategy and weighted items. All forms are normalized to ModelsAdvanced.
                properties:
                  strategy:
                    type: string
                    description: Strategy for selecting models when multiple are configured. round_robin cycles through models,
                      random selects randomly, weighted uses configured weights, modality_aware routes by input type.
                    enum:
                    - round_robin
                    - random
                    - weighted
                  items:
                    type: array
                    description: List of model configurations. At least one model required.
                    items:
                      type: object
                      description: |-
                        Configuration for a single model in advanced models configuration.

                        Used when the models section uses the advanced format with
                        explicit items, weights, and per-model settings.
                      properties:
                        name:
                          type: string
                          description: Model name or identifier as known to the inference server.
                        weight:
                          type: number
                          minimum: 0.0
                          maximum: 1.0
                          description: 'Selection weight for weighted strategy (0.0-1.0). Weights are normalized across all
                            models. Example: weight=0.7 means ~70%% of requests to this model.'
                        lora:
                          type: string
                          description: LoRA adapter name to load with this model. Server must support dynamic LoRA adapter
                            loading.
                        modalities:
                          type: array
                          items:
                            type: string
                          description: 'List of input modalities this model supports. Used with modality_aware selection strategy.
                            Valid values: ''text'', ''image'', ''audio'', ''video''.'
                        tokenizer:
                          type: object
                          description: |-
                            Per-model tokenizer override configuration.

                            Allows specifying a different tokenizer for a specific model,
                            useful when models require specialized tokenization.
                          properties:
                            name:
                              type: string
                              description: HuggingFace tokenizer identifier or local filesystem path.
                          required:
                          - name
                      required:
                      - name
                    minItems: 1
                required:
                - items
              endpoint:
                type: object
                description: Endpoint configuration for connecting to inference server(s). Includes URLs, API type, authentication,
                  timeout, and connection settings.
                properties:
                  urls:
                    type: array
                    description: 'List of server URLs to benchmark. Requests distributed according to url_strategy. Example:
                      [''http://localhost:8000/v1/chat/completions'']'
                    items:
                      type: string
                    minItems: 1
                  url_strategy:
                    type: string
                    enum:
                    - round_robin
                    description: Strategy for distributing requests across multiple URLs. round_robin cycles through URLs
                      in order.
                  type:
                    type: string
                    enum:
                    - chat
                    - cohere_rankings
                    - completions
                    - chat_embeddings
                    - embeddings
                    - hf_tei_rankings
                    - huggingface_generate
                    - image_generation
                    - video_generation
                    - image_retrieval
                    - nim_embeddings
                    - nim_rankings
                    - solido_rag
                    - template
                    description: 'API endpoint type determining request/response format. chat: OpenAI chat completions, completions:
                      OpenAI completions, embeddings: vector embeddings, rankings: reranking, template: custom format.'
                  path:
                    type: string
                    description: 'Override default endpoint path. Use for servers with non-standard API paths. Example: ''/custom/v2/generate'''
                  api_key:
                    type: string
                    description: 'API authentication key. Supports environment variable substitution: ${OPENAI_API_KEY}. Can
                      also use ${VAR:default} syntax for defaults.'
                  timeout:
                    type: number
                    description: Request timeout in seconds. Requests exceeding this duration are marked as failed. Should
                      exceed expected max response time.
                    default: 600.0
                    exclusiveMinimum: 0.0
                  streaming:
                    type: boolean
                    description: Enable streaming (Server-Sent Events) responses. Required for accurate TTFT (time to first
                      token) measurement. Server must support streaming for this to work.
                    default: false
                  transport:
                    type: string
                    enum:
                    - http
                    description: HTTP transport protocol (http/https). Auto-detected from URL scheme if not specified. Explicit
                      setting overrides auto-detection.
                  connection_reuse:
                    type: string
                    description: 'HTTP connection management strategy. pooled: shared connection pool (fastest), never: new
                      connection per request (includes TCP overhead), sticky_sessions: dedicated connection per session.'
                    enum:
                    - pooled
                    - never
                    - sticky-user-sessions
                  use_legacy_max_tokens:
                    type: boolean
                    description: Use 'max_tokens' field instead of 'max_completion_tokens'. Enable for compatibility with
                      older OpenAI API versions.
                    default: false
                  use_server_token_count:
                    type: boolean
                    description: Use server-reported token counts from response usage field. When true, trusts usage.prompt_tokens
                      and usage.completion_tokens. When false, counts tokens locally using configured tokenizer.
                    default: false
                  template:
                    type: object
                    description: |-
                      Configuration for custom template-based endpoints.

                      When endpoint type is "template", this configures how requests
                      are formatted and responses are parsed.
                    properties:
                      body:
                        type: string
                        description: 'Jinja2 template string for request body. Variables: {{prompt}}, {{max_tokens}}, {{model}},
                          {{messages}}, etc.'
                      response_field:
                        type: string
                        description: 'JSON path to extract response text from API response. Use dot notation for nested fields:
                          ''choices.0.message.content''.'
                        default: text
                    required:
                    - body
                  headers:
                    type: object
                    description: Custom HTTP headers to include in all requests. Useful for authentication, tracing, or routing.
                      Values support environment variable substitution.
                    additionalProperties:
                      type: string
                  download_video_content:
                    type: boolean
                    description: For video generation endpoints, download the video content after generation completes. When
                      enabled, request latency includes the video download time. When disabled, only generation time is measured.
                    default: false
                  extra:
                    type: object
                    description: 'Additional fields to include in request body. Merged into every request. Common fields:
                      temperature, top_p, top_k, stop.'
                    additionalProperties: true
                required:
                - urls
              datasets:
                type: object
                x-kubernetes-preserve-unknown-fields: true
                description: Named dataset configurations. Keys are dataset names that can be referenced in phases. Values
                  are dataset configs (synthetic, file, public, or composed with source+augment).
              load:
                type: object
                description: 'Benchmark load configuration. Can be a single load config (with ''type'' key) or named phases
                  (dict of phase configs). Single config is normalized to {''default'': config}. Order is preserved (Python
                  3.7+) for execution sequence.'
                additionalProperties:
                  type: object
                  description: |-
                    Unified phase configuration with type-based load generation.

                    The `type` field determines the load generation strategy and which
                    fields are required/relevant:

                    **concurrency**: Dispatch immediately when concurrency slot opens.
                        - Primary control: `concurrency`
                        - No rate limiting, pure concurrency-based throughput

                    **poisson/gamma/constant**: Rate-controlled request generation.
                        - Primary control: `rate` (required)
                        - `concurrency` acts as a cap on in-flight requests
                        - `smoothness` only used with gamma type

                    **user_centric**: Simulate N concurrent users sharing a global rate.
                        - Required: `users` and `rate`
                        - Requests distributed across simulated users

                    **fixed_schedule**: Replay requests at predetermined timestamps.
                        - Timestamps from trace dataset
                        - `auto_offset`, `start_offset`, `end_offset` control replay
                  properties:
                    type:
                      type: string
                      description: 'Load generation type. concurrency: concurrency-controlled immediate dispatch, poisson/gamma/constant:
                        rate-controlled with arrival distribution, user_centric: N users sharing global rate, fixed_schedule:
                        replay from timestamps.'
                      enum:
                      - concurrency
                      - constant
                      - gamma
                      - poisson
                      - fixed_schedule
                      - user_centric
                    dataset:
                      type: string
                      description: Name of dataset to use (from datasets section). If not specified, uses first defined dataset.
                    exclude:
                      type: boolean
                      description: Exclude this phase's metrics from final results. Set to true for warmup or cooldown phases.
                      default: false
                    requests:
                      type: integer
                      minimum: 1
                      description: Stop after this many requests sent (must be >= 1).
                    duration:
                      type: number
                      description: 'Stop after this time elapsed (must be > 0). Supports: 300, ''5m'', ''2h''.'
                    sessions:
                      type: integer
                      minimum: 1
                      description: Stop after this many sessions completed (must be >= 1).
                    concurrency:
                      type: integer
                      minimum: 1
                      description: 'Max concurrent in-flight requests (must be >= 1). For concurrency type: primary control.
                        For rate types: acts as a cap.'
                    concurrency_ramp:
                      type: object
                      description: |-
                        Configuration for gradual value ramping.

                        Controls how a value (concurrency, rate, etc.) transitions from
                        start to target over time.
                      properties:
                        duration:
                          type: number
                          description: Seconds to ramp from start to target value.
                          exclusiveMinimum: 0.0
                        strategy:
                          type: string
                          enum: &id001
                          - exponential
                          - linear
                          - poisson
                          description: 'Ramp curve shape: linear (constant rate), exponential (slow start, fast finish), poisson
                            (stochastic with guaranteed completion).'
                      required: &id002
                      - duration
                    prefill_concurrency:
                      type: integer
                      minimum: 1
                      description: Max concurrent requests in prefill stage (must be >= 1). Limits requests before first token
                        received.
                    prefill_ramp:
                      type: object
                      description: |-
                        Configuration for gradual value ramping.

                        Controls how a value (concurrency, rate, etc.) transitions from
                        start to target over time.
                      properties:
                        duration:
                          type: number
                          description: Seconds to ramp from start to target value.
                          exclusiveMinimum: 0.0
                        strategy:
                          type: string
                          enum: *id001
                          description: 'Ramp curve shape: linear (constant rate), exponential (slow start, fast finish), poisson
                            (stochastic with guaranteed completion).'
                      required: *id002
                    rate:
                      type: number
                      exclusiveMinimum: 0
                      description: 'Target request rate in requests per second (must be > 0). Required for poisson/gamma/constant
                        types. For user_centric: global rate shared across all users.'
                    rate_ramp:
                      type: object
                      description: |-
                        Configuration for gradual value ramping.

                        Controls how a value (concurrency, rate, etc.) transitions from
                        start to target over time.
                      properties:
                        duration:
                          type: number
                          description: Seconds to ramp from start to target value.
                          exclusiveMinimum: 0.0
                        strategy:
                          type: string
                          enum: *id001
                          description: 'Ramp curve shape: linear (constant rate), exponential (slow start, fast finish), poisson
                            (stochastic with guaranteed completion).'
                      required: *id002
                    smoothness:
                      type: number
                      exclusiveMinimum: 0
                      description: Gamma distribution shape parameter (must be > 0). Only used with type='gamma'. 1.0 = Poisson,
                        <1 = bursty, >1 = regular.
                    users:
                      type: integer
                      minimum: 1
                      description: Number of simulated concurrent users (must be >= 1). Required for user_centric type. Requests
                        distributed across users to achieve global rate.
                    auto_offset:
                      type: boolean
                      description: Normalize trace timestamps to start at 0. Subtracts minimum timestamp from all entries.
                        Only used with type='fixed_schedule'.
                      default: true
                    start_offset:
                      type: integer
                      minimum: 0
                      description: Filter out trace requests before this timestamp in ms (must be >= 0). Only used with type='fixed_schedule'.
                    end_offset:
                      type: integer
                      minimum: 0
                      description: Filter out trace requests after this timestamp in ms (must be >= 0). Only used with type='fixed_schedule'.
                    grace_period:
                      type: number
                      description: 'Seconds to wait for in-flight requests at phase end (must be >= 0). Supports: 30, ''30s'',
                        ''2m''.'
                    cancellation:
                      type: object
                      description: |-
                        Configuration for request cancellation testing.

                        Enables testing server behavior when clients cancel requests mid-flight.
                      properties:
                        rate:
                          type: number
                          description: Percentage of requests to cancel (0-100). 10.0 means 10%% of requests will be cancelled.
                          minimum: 0.0
                          maximum: 100.0
                        delay:
                          type: number
                          description: Seconds to wait after sending before cancelling. 0.0 means cancel immediately after
                            send.
                          default: 0.0
                          minimum: 0.0
                      required:
                      - rate
                    seamless:
                      type: boolean
                      description: Start this phase immediately when previous phase stops, without waiting for in-flight requests
                        to complete. Cannot be True for the first phase.
                      default: false
                  required:
                  - type
              artifacts:
                type: object
                description: Artifacts configuration for benchmark output. Controls output directory, console format, and
                  export formats.
                properties:
                  dir:
                    type: string
                    description: Output directory for all benchmark artifacts. Created if it doesn't exist.
                    default: artifacts
                  prefix:
                    type: string
                    description: 'Filename prefix for all exported files. Example: ''my_run'' produces ''my_run_summary.json'',
                      ''my_run_records.jsonl''.'
                    default: profile
                  console:
                    type: string
                    description: 'Console output format for results display. table: rich formatted tables, json: machine-readable,
                      minimal: progress only.'
                    enum:
                    - table
                    - json
                    - minimal
                  summary:
                    x-kubernetes-preserve-unknown-fields: true
                    description: 'Summary export formats. Options: json, yaml. Set to false to disable.'
                  records:
                    x-kubernetes-preserve-unknown-fields: true
                    description: 'Per-request records export formats. Options: jsonl, csv. Set to false to disable.'
                    default: false
                  raw:
                    type: boolean
                    description: Export raw request/response payloads as JSONL.
                    default: false
                  trace:
                    type: boolean
                    description: Export HTTP trace data for debugging.
                    default: false
                  slice_duration:
                    type: number
                    description: 'Time slice duration in seconds for trend analysis (must be > 0). Divides benchmark into
                      windows for per-window statistics. Supports: 30, ''30s'', ''5m'', ''2h''.'
                  show_trace_timing:
                    type: boolean
                    description: 'Display HTTP trace timing metrics in console output. Shows detailed timing breakdown: blocked,
                      DNS, connecting, sending, waiting (TTFB), receiving, and total duration.'
                    default: false
                  cli_command:
                    type: string
                    description: CLI command used to run the benchmark. Populated automatically when running via CLI.
                  benchmark_id:
                    type: string
                    description: Unique identifier for this benchmark run. Used to correlate artifacts across export formats.
                      Auto-generated if not provided.
              slos:
                type: object
                additionalProperties:
                  type: number
                description: SLO (Service Level Objectives) configuration as a generic dict. Maps metric names to threshold
                  values. A request is counted as good only if it meets ALL specified thresholds.
              tokenizer:
                type: object
                description: |-
                  Tokenizer configuration for token counting and prompt generation.

                  AIPerf uses a HuggingFace tokenizer for accurate token counting,
                  which is essential for ISL/OSL enforcement and metrics calculation.
                properties:
                  name:
                    type: string
                    description: 'HuggingFace tokenizer identifier or local filesystem path. Should match the model''s tokenizer
                      for accurate token counts. Example: ''meta-llama/Llama-3.1-8B-Instruct'''
                  revision:
                    type: string
                    description: 'Model revision to use: branch name, tag, or commit hash. Use for version pinning to ensure
                      reproducibility.'
                    default: main
                  trust_remote_code:
                    type: boolean
                    description: Allow execution of custom tokenizer code from the repository. Required for some models but
                      poses security risk. Only enable for trusted sources.
                    default: false
              gpu_telemetry:
                type: object
                description: 'GPU telemetry configuration for DCGM metrics collection. Collects GPU metrics (power, utilization,
                  temperature) from DCGM endpoints. Enabled by default. Set enabled: false to disable.'
                properties:
                  enabled:
                    type: boolean
                    description: Enable GPU telemetry collection. Set to false to disable.
                    default: true
                  urls:
                    type: array
                    description: 'DCGM exporter endpoint URLs. Example: http://localhost:9400/metrics'
                    items:
                      type: string
                  metrics_file:
                    type: string
                    description: Path to CSV file with pre-recorded GPU metrics. Alternative to live DCGM collection.
              server_metrics:
                type: object
                description: 'Server metrics configuration for Prometheus scraping. Collects operational metrics (queue depth,
                  KV cache, batch sizes) from inference server Prometheus endpoints. Enabled by default. Set enabled: false
                  to disable.'
                properties:
                  enabled:
                    type: boolean
                    description: Enable Prometheus metrics scraping. Set to false to disable.
                    default: true
                  urls:
                    type: array
                    description: Prometheus metrics endpoint URLs to scrape. Typically the /metrics endpoint on inference
                      servers.
                    items:
                      type: string
                  formats:
                    type: array
                    description: 'Export formats for scraped metrics. Options: json, csv, parquet, jsonl.'
                    items:
                      type: string
                      description: |-
                        Format options for server metrics export.

                        Controls which output files are generated for server metrics data.
                        Default selection is JSON + CSV (JSONL excluded to avoid large files).
                      enum:
                      - json
                      - csv
                      - jsonl
                      - parquet
              runtime:
                type: object
                description: Runtime configuration for worker processes and inter-process communication.
                properties:
                  ui:
                    type: string
                    enum:
                    - dashboard
                    - none
                    - simple
                    description: 'User interface mode. dashboard: rich interactive UI, simple: text progress, none: silent
                      operation.'
                  workers:
                    type: integer
                    minimum: 1
                    description: Maximum worker processes. null = auto-detect based on CPU cores.
                  record_processors:
                    type: integer
                    minimum: 1
                    description: Number of parallel record processors. null = auto-detect based on CPU cores.
                  communication:
                    x-kubernetes-preserve-unknown-fields: true
                    description: Inter-process communication configuration. Defaults to IPC for single-machine operation.
              logging:
                type: object
                description: Logging configuration for verbosity and debug settings. Supports per-service overrides and raw
                  Python logging.dictConfig.
                properties:
                  level:
                    type: string
                    description: 'Global logging verbosity level. trace: most verbose, error: least verbose.'
                    enum:
                    - TRACE
                    - DEBUG
                    - INFO
                    - NOTICE
                    - WARNING
                    - SUCCESS
                    - ERROR
                    - CRITICAL
                  config:
                    type: object
                    additionalProperties: true
                    description: Raw Python logging.dictConfig configuration. Overrides all other logging settings when provided.
              multi_run:
                type: object
                description: Multi-run benchmarking configuration for statistical reporting. When num_runs > 1, executes multiple
                  runs and computes aggregate statistics.
                properties:
                  num_runs:
                    type: integer
                    description: Number of profile runs to execute for confidence reporting. When 1, runs a single benchmark.
                      When >1, computes aggregate statistics across runs.
                    default: 1
                    minimum: 1
                    maximum: 10
                  cooldown_seconds:
                    type: number
                    description: Cooldown duration in seconds between profile runs. Allows the system to stabilize between
                      runs.
                    default: 0.0
                    minimum: 0
                  confidence_level:
                    type: number
                    description: 'Confidence level for computing confidence intervals (0-1). Common values: 0.90 (90%%), 0.95
                      (95%%), 0.99 (99%%).'
                    default: 0.95
                    exclusiveMinimum: 0
                    exclusiveMaximum: 1
                  disable_warmup_after_first:
                    type: boolean
                    description: Disable warmup for runs after the first. When true, only the first run includes warmup for
                      steady-state measurement.
                    default: true
                  set_consistent_seed:
                    type: boolean
                    description: Automatically set random seed for consistent workloads across runs. When true, sets random_seed=42
                      if not specified, ensuring identical workloads for valid statistical comparison.
                    default: true
              accuracy:
                type: object
                description: |-
                  Configuration for accuracy benchmarking mode.

                  When benchmark is set, enables accuracy evaluation alongside
                  performance profiling using standard benchmarks (MMLU, AIME, etc.).
                properties:
                  benchmark:
                    type: string
                    description: Accuracy benchmark to run (e.g., mmlu, aime, hellaswag). When set, enables accuracy benchmarking
                      mode.
                  tasks:
                    type: array
                    items:
                      type: string
                    description: Specific tasks or subtasks within the benchmark to evaluate (e.g., specific MMLU subjects).
                      If not set, all tasks are included.
                  n_shots:
                    type: integer
                    description: Number of few-shot examples to include in the prompt. 0 means zero-shot evaluation. Maximum
                      8.
                    default: 0
                    minimum: 0
                    maximum: 8
                  enable_cot:
                    type: boolean
                    description: Enable chain-of-thought prompting for accuracy evaluation.
                    default: false
                  grader:
                    type: string
                    description: Override the default grader for the selected benchmark (e.g., exact_match, math, multiple_choice,
                      code_execution).
                  system_prompt:
                    type: string
                    description: Custom system prompt to use for accuracy evaluation. Overrides any benchmark-specific system
                      prompt.
                  verbose:
                    type: boolean
                    description: Enable verbose output for accuracy evaluation, showing per-problem grading details.
                    default: false
              random_seed:
                type: integer
                description: Global random seed for reproducibility. Can be overridden per-dataset. If not set, uses system
                  entropy.
              connectionsPerWorker:
                type: integer
                description: Connections per worker for auto-scaling calculation
                minimum: 1
                default: 500
              timeoutSeconds:
                type: number
                description: Job timeout in seconds (0 = no timeout, overrides AIPERF_JOB_TIMEOUT_SECONDS)
                minimum: 0
                default: 0
              ttlSecondsAfterFinished:
                type: integer
                description: TTL in seconds for JobSet cleanup after completion
                minimum: 0
              resultsTtlDays:
                type: integer
                description: Days to retain result files before cleanup
                minimum: 1
              cancel:
                type: boolean
                description: Set to true to cancel a running benchmark
              podTemplate:
                type: object
                properties:
                  nodeSelector:
                    type: object
                    additionalProperties:
                      type: string
                    description: Node selector labels
                  tolerations:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                        operator:
                          type: string
                          enum:
                          - Exists
                          - Equal
                        value:
                          type: string
                        effect:
                          type: string
                          enum:
                          - NoSchedule
                          - PreferNoSchedule
                          - NoExecute
                        tolerationSeconds:
                          type: integer
                    description: Pod tolerations
                  annotations:
                    type: object
                    additionalProperties:
                      type: string
                    description: Additional pod annotations
                  labels:
                    type: object
                    additionalProperties:
                      type: string
                    description: Additional pod labels
                  imagePullSecrets:
                    type: array
                    items:
                      type: string
                    description: Image pull secret names
                  serviceAccountName:
                    type: string
                    description: Service account name
                  env:
                    type: array
                    items:
                      type: object
                      required:
                      - name
                      properties:
                        name:
                          type: string
                        value:
                          type: string
                        valueFrom:
                          type: object
                          properties:
                            secretKeyRef:
                              type: object
                              required:
                              - name
                              - key
                              properties:
                                name:
                                  type: string
                                key:
                                  type: string
                    description: Environment variables
                  volumes:
                    type: array
                    items:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    description: Additional volumes
                  volumeMounts:
                    type: array
                    items:
                      type: object
                      required:
                      - name
                      - mountPath
                      properties:
                        name:
                          type: string
                        mountPath:
                          type: string
                        subPath:
                          type: string
                        readOnly:
                          type: boolean
                    description: Volume mounts for containers
              scheduling:
                type: object
                properties:
                  queueName:
                    type: string
                    description: Kueue LocalQueue name for gang-scheduling admission
                  priorityClass:
                    type: string
                    description: Kueue WorkloadPriorityClass for scheduling priority
                description: Kueue scheduling configuration for gang-scheduling
          status:
            type: object
            properties:
              observedGeneration:
                type: integer
                format: int64
                description: Generation of the spec that was last processed
              phase:
                type: string
                description: Current job phase
                enum:
                - Pending
                - Queued
                - Initializing
                - Running
                - Completed
                - Failed
                - Cancelled
              jobId:
                type: string
                description: Unique job identifier
              startTime:
                type: string
                format: date-time
                description: Time when job started
              completionTime:
                type: string
                format: date-time
                description: Time when job completed
              jobSetName:
                type: string
                description: Name of the managed JobSet
              error:
                type: string
                description: Error message if failed
              workers:
                type: object
                properties:
                  ready:
                    type: integer
                    description: Number of ready workers
                  total:
                    type: integer
                    description: Total number of workers
              phases:
                type: object
                description: Progress tracking for each benchmark phase (keyed by phase name)
                additionalProperties:
                  type: object
                  description: Phase progress stats
                  x-kubernetes-preserve-unknown-fields: true
              currentPhase:
                type: string
                description: Current benchmark phase (warmup, profiling, etc)
              liveMetrics:
                type: object
                x-kubernetes-preserve-unknown-fields: true
                description: Live metrics updated during benchmark run
              serverMetrics:
                type: object
                x-kubernetes-preserve-unknown-fields: true
