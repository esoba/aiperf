# Nightly build and release pipeline.
#
# Phases:
#   1. Init     — compute version strings (rerun-stable via artifact)
#   2. Validate — pre-commit + test placeholders
#   3. Build    — wheel (→ S3) + multi-arch containers (→ ECR)
#   4. Tag      — create nightly git tag
#   5. Stage    — [automated-release approval] ECR → NGC staging; S3 → Artifactory
#   6. Scan     — trigger GitLab security scan (fire-and-forget)
#   7. Summary  — always runs
#
# release=true (default): full pipeline including approval gate and GitLab scan.
# release=false: build and tag only; skip staging and scan.

name: Nightly

on:
  push:
    branches:
      - 'pvijayakrish/automate-release-rc'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build from (branch, tag, or full SHA). Defaults to the default branch.'
        default: ''
        required: false
      release:
        description: 'Stage artifacts and trigger GitLab security scan. Requires automated-release approval.'
        type: boolean
        default: true
      skip_security_scan:
        description: 'Skip GitLab security scan. Emergency use only — requires explicit justification.'
        type: boolean
        default: false
      publish_only:
        description: 'Skip build phase; re-stage existing artifacts. Requires pep440_version.'
        type: boolean
        default: false
      pep440_version:
        description: 'Existing PEP 440 version to re-stage (used only when publish_only=true).'
        default: ''
        required: false

# Prevent overlapping nightly runs from corrupting shared ECR tags and S3 prefixes.
# cancel-in-progress: false — never cancel a run that may be pending human approval.
concurrency:
  group: nightly-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  # ============================================================================
  # PHASE 1: INIT
  # Version strings are computed once and saved as a workflow artifact so that
  # partial reruns use the same versions as the original run.
  # ============================================================================

  prepare-nightly:
    name: Prepare Nightly
    runs-on: ubuntu-latest
    outputs:
      nightly_tag:    ${{ steps.version.outputs.nightly_tag }}
      pep440_version: ${{ steps.version.outputs.pep440_version }}
      wheel_filename: ${{ steps.version.outputs.wheel_filename }}
      base_version:   ${{ steps.version.outputs.base_version }}
      run_timestamp:  ${{ steps.version.outputs.run_timestamp }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Restore version artifact from prior attempt
        id: restore
        uses: actions/download-artifact@v4
        with:
          name: nightly-version
          path: .nightly-version/
        continue-on-error: true

      - name: Compute or restore version strings
        id: version
        run: |
          set -euo pipefail

          if [ -f ".nightly-version/version-info.env" ]; then
            echo "Restoring version strings from prior run attempt."
            # shellcheck source=/dev/null
            source .nightly-version/version-info.env
          else
            TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
            HUMAN_TS=$(date -u +%Y-%m-%d-%H%M%S)

            BASE_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
            if [[ ! "${BASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Cannot parse base version from pyproject.toml (got '${BASE_VERSION}')"
              exit 1
            fi

            if [ "${{ inputs.publish_only }}" = "true" ]; then
              PEP440_VERSION="${{ inputs.pep440_version }}"
              if [ -z "${PEP440_VERSION}" ]; then
                echo "::error::publish_only=true requires pep440_version input"
                exit 1
              fi
              NIGHTLY_TAG="nightly-republish-${PEP440_VERSION}"
            else
              NIGHTLY_TAG="nightly-${HUMAN_TS}"
              PEP440_VERSION="${BASE_VERSION}.dev${TIMESTAMP}"
            fi

            WHEEL_FILENAME="aiperf-${PEP440_VERSION}-py3-none-any.whl"
          fi

          echo "nightly_tag=${NIGHTLY_TAG}"         >> "$GITHUB_OUTPUT"
          echo "pep440_version=${PEP440_VERSION}"   >> "$GITHUB_OUTPUT"
          echo "wheel_filename=${WHEEL_FILENAME}"   >> "$GITHUB_OUTPUT"
          echo "base_version=${BASE_VERSION}"       >> "$GITHUB_OUTPUT"
          echo "run_timestamp=${TIMESTAMP:-reused}" >> "$GITHUB_OUTPUT"

          mkdir -p .nightly-version
          {
            echo "NIGHTLY_TAG=${NIGHTLY_TAG}"
            echo "PEP440_VERSION=${PEP440_VERSION}"
            echo "WHEEL_FILENAME=${WHEEL_FILENAME}"
            echo "BASE_VERSION=${BASE_VERSION}"
            echo "TIMESTAMP=${TIMESTAMP:-reused}"
          } > .nightly-version/version-info.env

      - name: Save version artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-version
          path: .nightly-version/version-info.env
          overwrite: true
          retention-days: 7

  # ============================================================================
  # PHASE 2: VALIDATE
  # pre-commit is a real gate. Test jobs are placeholders until runners are ready.
  # ============================================================================

  pre-commit:
    name: Pre-commit Checks
    needs: [prepare-nightly]
    runs-on: ubuntu-latest
    if: ${{ inputs.publish_only != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: make first-time-setup PYTHON_VERSION=3.12

      - name: Run pre-commit
        run: |
          . .venv/bin/activate
          pre-commit run --all-files

  unit-tests:
    name: Unit Tests
    needs: [prepare-nightly]
    runs-on: ubuntu-latest
    if: ${{ inputs.publish_only != 'true' }}
    steps:
      - name: Placeholder
        # Replace with: uv run pytest tests/unit/ -n auto
        run: echo "Tests temporarily disabled"

  integration-tests:
    name: Integration Tests
    needs: [prepare-nightly]
    runs-on: ubuntu-latest
    if: ${{ inputs.publish_only != 'true' }}
    steps:
      - name: Placeholder
        # Replace with: uv run pytest -m integration -n auto
        run: echo "Tests temporarily disabled"

  gpu-e2e-tests:
    name: GPU End-to-End Tests
    needs: [prepare-nightly]
    runs-on: ubuntu-latest
    if: ${{ inputs.publish_only != 'true' }}
    steps:
      - name: Placeholder
        run: echo "GPU runners not yet provisioned"

  # ============================================================================
  # PHASE 3: BUILD
  # No environment: declaration — builder runners carry AWS credentials via IAM
  # instance profile. The automated-release gate is enforced at staging only.
  # ============================================================================

  build-wheel:
    name: Build Wheel
    needs: [prepare-nightly, pre-commit, unit-tests, integration-tests, gpu-e2e-tests]
    runs-on: prod-aiperf-builder-amd-v1
    if: ${{ inputs.publish_only != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Patch version in pyproject.toml
        uses: ./.github/actions/update-pyproject-version
        with:
          version: ${{ needs.prepare-nightly.outputs.pep440_version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build wheel via Docker wheel-builder stage
        run: |
          docker buildx build \
            --target wheel-builder \
            --cache-from type=gha,scope=wheel-amd64 \
            --cache-to   type=gha,scope=wheel-amd64,mode=max \
            --output     type=local,dest=./dist/ \
            .

      - name: Detect and validate wheel
        id: wheel
        env:
          EXPECTED_VERSION: ${{ needs.prepare-nightly.outputs.pep440_version }}
        run: |
          set -euo pipefail

          mapfile -t WHEELS < <(find dist/ -name "aiperf-*.whl" -type f)
          if [ "${#WHEELS[@]}" -eq 0 ]; then
            echo "::error::No wheel found in dist/ after build"
            exit 1
          fi
          if [ "${#WHEELS[@]}" -gt 1 ]; then
            echo "::error::Multiple wheels found in dist/ — expected exactly one:"
            printf '  %s\n' "${WHEELS[@]}"
            exit 1
          fi
          WHEEL_PATH="${WHEELS[0]}"

          uvx twine check "${WHEEL_PATH}"
          uv venv .venv-check
          uv pip install --python .venv-check/bin/python "${WHEEL_PATH}"
          INSTALLED_VERSION=$(.venv-check/bin/python -c "import aiperf; print(aiperf.__version__)")
          if [ "${INSTALLED_VERSION}" != "${EXPECTED_VERSION}" ]; then
            echo "::error::Wheel version mismatch: expected '${EXPECTED_VERSION}', got '${INSTALLED_VERSION}'"
            exit 1
          fi
          .venv-check/bin/aiperf --help

          echo "wheel_path=${WHEEL_PATH}"                    >> "$GITHUB_OUTPUT"
          echo "wheel_filename=$(basename "${WHEEL_PATH}")"  >> "$GITHUB_OUTPUT"

      - name: Upload wheel to S3
        env:
          S3_BUCKET:      ${{ secrets.S3_CI_WHEELS_BUCKET }}
          PEP440_VERSION: ${{ needs.prepare-nightly.outputs.pep440_version }}
        run: |
          set -euo pipefail
          WHEEL=$(find dist/ -name "aiperf-*.whl" | head -1)
          aws s3 cp "${WHEEL}" "s3://${S3_BUCKET}/aiperf/nightly/${PEP440_VERSION}/" --sse AES256

  build-container:
    name: Build Container (${{ matrix.arch }})
    needs: [prepare-nightly, pre-commit, unit-tests, integration-tests, gpu-e2e-tests]
    if: ${{ inputs.publish_only != 'true' }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: prod-aiperf-builder-amd-v1
          - arch: arm64
            platform: linux/arm64
            runner: prod-aiperf-builder-arm-v1
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Verify checkout SHA
        run: |
          ACTUAL=$(git rev-parse HEAD)
          echo "Building from SHA: ${ACTUAL}"
          if [ "${{ inputs.ref }}" = "" ] && [ "${ACTUAL}" != "${{ github.sha }}" ]; then
            echo "::warning::Checkout SHA ${ACTUAL} does not match github.sha ${{ github.sha }}"
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Patch version in pyproject.toml
        uses: ./.github/actions/update-pyproject-version
        with:
          version: ${{ needs.prepare-nightly.outputs.pep440_version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ECR
        env:
          AWS_ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          aws ecr get-login-password --region "${AWS_DEFAULT_REGION}" \
            | docker login --username AWS --password-stdin \
                "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"

      - name: Build and push ${{ matrix.arch }} image to ECR
        env:
          AWS_ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          PEP440_VERSION:     ${{ needs.prepare-nightly.outputs.pep440_version }}
        run: |
          set -euo pipefail
          REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
          IMAGE_TAG="${PEP440_VERSION}-${{ matrix.arch }}"

          refresh_ecr_token() {
            while sleep 21600; do
              aws ecr get-login-password --region "${AWS_DEFAULT_REGION}" \
                | docker login --username AWS --password-stdin "${REGISTRY}" 2>/dev/null || true
            done
          }
          refresh_ecr_token &
          REFRESH_PID=$!
          trap 'kill ${REFRESH_PID} 2>/dev/null || true' EXIT

          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --target   runtime \
            --cache-from "type=registry,ref=${REGISTRY}/aiperf:cache-${{ matrix.arch }}" \
            --cache-to   "type=registry,ref=${REGISTRY}/aiperf:cache-${{ matrix.arch }},mode=max" \
            --push \
            --tag "${REGISTRY}/aiperf:${IMAGE_TAG}" \
            .

          DIGEST=$(docker buildx imagetools inspect "${REGISTRY}/aiperf:${IMAGE_TAG}" \
            --format '{{.Manifest.Digest}}')
          echo "Pushed ${REGISTRY}/aiperf:${IMAGE_TAG} — digest: ${DIGEST}"

  create-multiarch-manifest-ecr:
    name: Create Multi-arch Manifest (ECR)
    needs: [prepare-nightly, build-container]
    runs-on: prod-aiperf-default-v1
    if: ${{ inputs.publish_only != 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get ECR login token
        id: ecr
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          echo "password=$(aws ecr get-login-password --region "${AWS_DEFAULT_REGION}")" >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifest on ECR
        uses: ./.github/actions/create-multiarch-manifest
        with:
          registry:          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com
          registry-username: AWS
          registry-password: ${{ steps.ecr.outputs.password }}
          target-image: >-
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/aiperf:${{ needs.prepare-nightly.outputs.pep440_version }}
          source-images: >-
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/aiperf:${{ needs.prepare-nightly.outputs.pep440_version }}-amd64
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/aiperf:${{ needs.prepare-nightly.outputs.pep440_version }}-arm64

  # ============================================================================
  # PHASE 4: TAG
  # ============================================================================

  create-nightly-tag:
    name: Create Nightly Tag
    needs: [prepare-nightly, build-wheel, create-multiarch-manifest-ecr]
    runs-on: ubuntu-latest
    if: ${{ inputs.publish_only != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.NIGHTLY_GITHUB_PAT || github.token }}
          ref: ${{ inputs.ref || github.ref }}

      - name: Push nightly tag (idempotent)
        env:
          NIGHTLY_TAG: ${{ needs.prepare-nightly.outputs.nightly_tag }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          EXISTING_SHA=$(git ls-remote origin "refs/tags/${NIGHTLY_TAG}" | awk '{print $1}')
          HEAD_SHA=$(git rev-parse HEAD)

          if [ -n "${EXISTING_SHA}" ]; then
            COMMIT_SHA=$(git ls-remote origin "refs/tags/${NIGHTLY_TAG}^{}" | awk '{print $1}')
            if [ "${COMMIT_SHA:-${EXISTING_SHA}}" = "${HEAD_SHA}" ]; then
              echo "Tag ${NIGHTLY_TAG} already exists at ${HEAD_SHA} — skipping."
              exit 0
            else
              echo "::error::Tag ${NIGHTLY_TAG} exists at ${COMMIT_SHA:-${EXISTING_SHA}}, not ${HEAD_SHA}."
              echo "::error::Version collision — investigate before proceeding."
              exit 1
            fi
          fi

          git tag -a "${NIGHTLY_TAG}" -m "Nightly build ${NIGHTLY_TAG}"
          echo "Tag created locally (not pushed): ${NIGHTLY_TAG}"

  # ============================================================================
  # PHASE 5: STAGE
  # Both jobs run under automated-release, which requires human approval before
  # proceeding (configured in GitHub: Settings > Environments > automated-release).
  # Runs on all triggers unless explicitly disabled via workflow_dispatch release=false.
  # ============================================================================

  stage-nightly-container:
    name: Stage Container (ECR → NGC Staging)
    needs: [prepare-nightly, create-nightly-tag]
    runs-on: prod-aiperf-default-v1
    environment: automated-release
    if: ${{ inputs.publish_only != 'true' && (github.event_name != 'workflow_dispatch' || inputs.release == true) }}
    env:
      CRANE_VERSION: v0.20.2
      CRANE_SHA256: ''
    steps:
      - name: Install crane
        run: |
          set -euo pipefail
          TARBALL="go-containerregistry_Linux_x86_64.tar.gz"
          curl -fsSL \
            "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/${TARBALL}" \
            -o "${TARBALL}"
          if [ -n "${CRANE_SHA256}" ]; then
            echo "${CRANE_SHA256}  ${TARBALL}" | sha256sum --check
          else
            echo "::warning::CRANE_SHA256 not set — skipping checksum verification"
          fi
          tar -xzf "${TARBALL}" crane
          sudo mv crane /usr/local/bin/crane
          rm "${TARBALL}"

      - name: Log in to ECR and NGC staging
        env:
          AWS_ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          NGC_TOKEN:          ${{ secrets.NGC_PUBLISH_TOKEN }}
          NGC_USERNAME:       ${{ secrets.NGC_PUBLISH_USERNAME }}
        run: |
          aws ecr get-login-password --region "${AWS_DEFAULT_REGION}" \
            | crane auth login \
                "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com" \
                --username AWS --password-stdin
          echo "${NGC_TOKEN}" | crane auth login nvcr.io \
            --username "${NGC_USERNAME}" --password-stdin

      - name: Copy multi-arch images ECR → NGC staging
        env:
          AWS_ACCOUNT_ID:         ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_DEFAULT_REGION:     ${{ secrets.AWS_DEFAULT_REGION }}
          NGC_STAGING_IMAGE_BASE: ${{ secrets.NGC_STAGING_IMAGE_BASE }}
          PEP440_VERSION:         ${{ needs.prepare-nightly.outputs.pep440_version }}
        run: |
          set -euo pipefail
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"

          for ARCH in amd64 arm64; do
            crane copy \
              "${ECR_REGISTRY}/aiperf:${PEP440_VERSION}-${ARCH}" \
              "${NGC_STAGING_IMAGE_BASE}/aiperf-nightly:${PEP440_VERSION}-${ARCH}"
          done

          crane delete "${NGC_STAGING_IMAGE_BASE}/aiperf-nightly:${PEP440_VERSION}" 2>/dev/null || true
          crane index append \
            --manifest "${NGC_STAGING_IMAGE_BASE}/aiperf-nightly:${PEP440_VERSION}-amd64" \
            --manifest "${NGC_STAGING_IMAGE_BASE}/aiperf-nightly:${PEP440_VERSION}-arm64" \
            --tag      "${NGC_STAGING_IMAGE_BASE}/aiperf-nightly:${PEP440_VERSION}"
          echo "Container staged: ${NGC_STAGING_IMAGE_BASE}/aiperf-nightly:${PEP440_VERSION}"

  stage-nightly-wheel:
    name: Stage Wheel (S3 → Artifactory)
    needs: [prepare-nightly, create-nightly-tag]
    runs-on: prod-aiperf-default-v1
    environment: automated-release
    if: ${{ inputs.publish_only != 'true' && (github.event_name != 'workflow_dispatch' || inputs.release == true) }}
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Upload wheel from S3 to Artifactory
        env:
          S3_BUCKET:         ${{ secrets.S3_CI_WHEELS_BUCKET }}
          ARTIFACTORY_URL:   ${{ secrets.ARTIFACTORY_URL }}
          ARTIFACTORY_USER:  ${{ secrets.ARTIFACTORY_USER }}
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
          PEP440_VERSION:    ${{ needs.prepare-nightly.outputs.pep440_version }}
        run: |
          set -euo pipefail
          TMPDIR=$(mktemp -d)
          trap 'rm -rf "${TMPDIR}"' EXIT

          aws s3 cp \
            "s3://${S3_BUCKET}/aiperf/nightly/${PEP440_VERSION}/" \
            "${TMPDIR}/" --recursive --include "*.whl"

          mapfile -t WHEELS < <(find "${TMPDIR}" -name "*.whl" -type f)
          if [ "${#WHEELS[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one wheel from S3, found ${#WHEELS[@]}"
            exit 1
          fi

          TWINE_NON_INTERACTIVE=1 uvx twine upload \
            --repository-url "${ARTIFACTORY_URL}" \
            --username        "${ARTIFACTORY_USER}" \
            --password        "${ARTIFACTORY_TOKEN}" \
            --disable-progress-bar \
            "${WHEELS[0]}"
          echo "Wheel staged to Artifactory: ${PEP440_VERSION}"

  # ============================================================================
  # PHASE 6: TRIGGER GITLAB SECURITY SCAN
  # Fire-and-forget. Passes full artifact locations so GitLab can pull containers
  # from NGC staging and download the wheel from Artifactory without further input.
  # ============================================================================

  trigger-gitlab-security-scan:
    name: Trigger GitLab Security Scan
    needs: [prepare-nightly, stage-nightly-container, stage-nightly-wheel]
    runs-on:
      group: gitlab_ci_runners
    environment: automated-release
    if: ${{ inputs.publish_only != 'true' && inputs.skip_security_scan != 'true' && (github.event_name != 'workflow_dispatch' || inputs.release == true) }}
    steps:
      - name: Trigger GitLab pipeline
        env:
          GITLAB_TRIGGER_TOKEN:   ${{ secrets.GITLAB_TRIGGER_TOKEN }}
          GITLAB_TRIGGER_URL:     ${{ secrets.GITLAB_PIPELINE_URL }}
          NIGHTLY_TAG:            ${{ needs.prepare-nightly.outputs.nightly_tag }}
          PEP440_VERSION:         ${{ needs.prepare-nightly.outputs.pep440_version }}
          ARTIFACTORY_PYPI_URL:   ${{ secrets.ARTIFACTORY_PYPI_URL }}
        run: |
          set -euo pipefail

          RELEASE_TYPE="ondemand"
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            RELEASE_TYPE="nightly"
          fi

          TOKEN_FILE=$(mktemp)
          echo -n "${GITLAB_TRIGGER_TOKEN}" > "${TOKEN_FILE}"
          trap 'rm -f "${TOKEN_FILE}"' EXIT

          RESPONSE=$(curl -fsSL \
            --request POST \
            --form "token=<${TOKEN_FILE}" \
            --form "ref=main" \
            --form "variables[PIPELINE_TYPE]=security" \
            --form "variables[RELEASE_TYPE]=${RELEASE_TYPE}" \
            --form "variables[PROJECT]=aiperf" \
            --form "variables[SOURCE_BRANCH]=${GITHUB_REF_NAME}" \
            --form "variables[NIGHTLY_TAG]=${NIGHTLY_TAG}" \
            --form "variables[PEP440_VERSION]=${PEP440_VERSION}" \
            --form "variables[COMMIT_SHA]=${{ github.sha }}" \
            --form "variables[GITHUB_RUN_ID]=${GITHUB_RUN_ID}" \
            --form "variables[ARTIFACTS]=wheel,container" \
            --form "variables[ARTIFACTORY_PYPI_URL]=${ARTIFACTORY_PYPI_URL}" \
            --form "variables[ENABLE_PULSE_SCAN]=true" \
            --form "variables[ENABLE_WHEEL_SCAN]=true" \
            --form "variables[ENABLE_SONARQUBE]=true" \
            --form "variables[SONAR_REPO]=aiperf" \
            --form "variables[SONAR_BRANCH]=${GITHUB_REF_NAME}" \
            "${GITLAB_TRIGGER_URL}")

          PIPELINE_ID=$(echo "${RESPONSE}" | jq -r '.id // empty')
          if [ -z "${PIPELINE_ID}" ]; then
            echo "::error::Failed to trigger GitLab pipeline or parse response"
            exit 1
          fi

          echo "GitLab security scan triggered: pipeline ID ${PIPELINE_ID}"

  # ============================================================================
  # PHASE 7: SUMMARY
  # ============================================================================

  pipeline-summary:
    name: Pipeline Summary
    needs:
      - prepare-nightly
      - pre-commit
      - unit-tests
      - integration-tests
      - gpu-e2e-tests
      - build-wheel
      - build-container
      - create-multiarch-manifest-ecr
      - create-nightly-tag
      - stage-nightly-container
      - stage-nightly-wheel
      - trigger-gitlab-security-scan
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write pipeline summary
        env:
          NIGHTLY_TAG:    ${{ needs.prepare-nightly.outputs.nightly_tag }}
          PEP440_VERSION: ${{ needs.prepare-nightly.outputs.pep440_version }}
        run: |
          {
            echo "## Nightly Pipeline Summary"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Tag | \`${NIGHTLY_TAG}\` |"
            echo "| Version | \`${PEP440_VERSION}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Git ref | \`${{ inputs.ref || github.ref }}\` |"
            echo "| Branch | \`${GITHUB_REF_NAME}\` |"
            echo "| Trigger | ${{ github.event_name }} |"
            echo "| Release mode | ${{ inputs.release }} |"
            echo ""
            echo "### Quality Gates"
            echo "| Gate | Result |"
            echo "|------|--------|"
            echo "| pre-commit | ${{ needs.pre-commit.result }} |"
            echo "| unit-tests | ${{ needs.unit-tests.result }} |"
            echo "| integration-tests | ${{ needs.integration-tests.result }} |"
            echo "| gpu-e2e-tests | ${{ needs.gpu-e2e-tests.result }} |"
            echo ""
            echo "### Build + Upload"
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| build-wheel (→ S3) | ${{ needs.build-wheel.result }} |"
            echo "| build-container (→ ECR) | ${{ needs.build-container.result }} |"
            echo "| create-multiarch-manifest-ecr | ${{ needs.create-multiarch-manifest-ecr.result }} |"
            echo "| create-nightly-tag | ${{ needs.create-nightly-tag.result }} |"
            echo ""
            echo "### Stage + Scan"
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| stage-nightly-container (→ NGC staging) | ${{ needs.stage-nightly-container.result }} |"
            echo "| stage-nightly-wheel (→ Artifactory) | ${{ needs.stage-nightly-wheel.result }} |"
            echo "| trigger-gitlab-security-scan | ${{ needs.trigger-gitlab-security-scan.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure
        if: ${{ failure() }}
        env:
          NIGHTLY_TAG:   ${{ needs.prepare-nightly.outputs.nightly_tag }}
          RUN_URL:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_WEBHOOK: ${{ secrets.NIGHTLY_SLACK_WEBHOOK }}
        run: |
          if [ -z "${SLACK_WEBHOOK}" ]; then
            echo "::warning::NIGHTLY_SLACK_WEBHOOK is not configured — skipping failure notification"
            exit 0
          fi
          curl -fsSL \
            --request POST \
            --header "Content-Type: application/json" \
            --data "{\"text\":\"Nightly pipeline failed: ${NIGHTLY_TAG}\n${RUN_URL}\"}" \
            "${SLACK_WEBHOOK}"
