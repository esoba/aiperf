# Nightly build and optional release pipeline.
#
# Phases (all run automatically unless noted):
#   1. Init        — compute version strings; save to artifact for rerun stability
#   2. Validate    — pre-commit (real gate); tests are placeholders until re-enabled
#   3. Build       — wheel + multi-arch containers; runner IAM handles registry auth
#   4. Stage       — push artifacts to intermediate stores (S3, ECR multiarch)
#   5. Compliance  — compliance-check placeholder + GitLab security scan (blocking poll)
#   6. Tag         — create nightly git tag; exits 1 if any phase-5 gate failed
#   7. Release     — [HUMAN APPROVAL] automated-release environment pauses here (24 h timeout)
#   8. Publish     — wheel to Artifactory, container to NGC; explicit approval guard
#   9. Summary     — always runs; writes consolidated summary; notifies on failure
#
# Compliance blocking pattern:
#   compliance-check and trigger-gitlab-security-scan (phase 5) each output
#   compliant=true|false and scan_passed=true|false respectively. Neither job
#   fails itself. create-nightly-tag (phase 6) reads both outputs and exits 1
#   if either is not "true". All downstream jobs inherit that failure via needs.
#   pipeline-summary always runs to report the outcome.
#
# Rerun safety:
#   prepare-nightly writes computed version strings to a workflow artifact
#   (nightly-version/version-info.env). Downstream jobs restore this artifact
#   so that partial reruns (without re-running prepare-nightly) use the same
#   version strings as the original run, preventing artifact-version divergence.
#   Do not re-run prepare-nightly individually after downstream jobs have
#   already pushed artifacts under the original version.
#
# Environment setup required in GitHub:
#   automated-release:
#     Required reviewers: release engineering team
#     Deployment branches: main only
#     Wait timer: 0
#     Environment timeout: 24 hours (configure in GitHub UI, not here)
#
# New secrets required (beyond existing AWS/NGC/Artifactory/GitLab secrets):
#   NIGHTLY_GITHUB_PAT       — fine-grained PAT with contents:write for tag push
#   GITLAB_API_TOKEN         — GitLab project access token; scopes: read_api
#                              (also requires "Allow access to artifacts" enabled in
#                              GitLab project Settings > CI/CD > Job artifacts)
#   GITLAB_PROJECT_API_URL   — e.g. https://gitlab-master.nvidia.com/api/v4/projects/<ID>
#   NIGHTLY_SLACK_WEBHOOK    — Slack incoming webhook for failure notifications

name: Nightly

on:
  push:
    branches:
      - 'pvijayakrish/automate-release-rc'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build from (branch, tag, or full SHA). Defaults to the default branch.'
        default: ''
        required: false
      skip_security_scan:
        description: 'Skip GitLab security scan. Emergency use only — requires explicit justification.'
        type: boolean
        default: false
      publish_only:
        description: 'Skip build phase; re-publish existing artifacts. Requires pep440_version.'
        type: boolean
        default: false
      pep440_version:
        description: 'Existing PEP 440 version to re-publish (used only when publish_only=true).'
        default: ''
        required: false

# Prevent overlapping nightly runs from corrupting shared ECR tags and S3 prefixes.
# cancel-in-progress: false — never cancel a run that may be pending human approval.
concurrency:
  group: nightly-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  # ============================================================================
  # PHASE 1: INIT
  # Version strings are computed once and saved as a workflow artifact so that
  # partial reruns (e.g., re-running a failed build job without re-running this
  # job) use the same versions as the original run.
  # ============================================================================

  prepare-nightly:
    name: Prepare Nightly
    runs-on: ubuntu-latest
    outputs:
      nightly_tag:    ${{ steps.version.outputs.nightly_tag }}
      pep440_version: ${{ steps.version.outputs.pep440_version }}
      wheel_filename: ${{ steps.version.outputs.wheel_filename }}
      base_version:   ${{ steps.version.outputs.base_version }}
      run_timestamp:  ${{ steps.version.outputs.run_timestamp }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Restore version artifact from prior attempt
        id: restore
        uses: actions/download-artifact@v4
        with:
          name: nightly-version
          path: .nightly-version/
        continue-on-error: true

      - name: Compute or restore version strings
        id: version
        run: |
          set -euo pipefail

          # If a prior run attempt already computed version strings, reuse them
          # to prevent artifact-version divergence on partial reruns.
          if [ -f ".nightly-version/version-info.env" ]; then
            echo "Restoring version strings from prior run attempt."
            # shellcheck source=/dev/null
            source .nightly-version/version-info.env
          else
            TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
            HUMAN_TS=$(date -u +%Y-%m-%d-%H%M%S)

            BASE_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
            if [[ ! "${BASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Cannot parse base version from pyproject.toml (got '${BASE_VERSION}')"
              exit 1
            fi

            # publish_only: use caller-supplied version, skip timestamp computation.
            if [ "${{ inputs.publish_only }}" = "true" ]; then
              PEP440_VERSION="${{ inputs.pep440_version }}"
              if [ -z "${PEP440_VERSION}" ]; then
                echo "::error::publish_only=true requires pep440_version input"
                exit 1
              fi
              NIGHTLY_TAG="nightly-republish-${PEP440_VERSION}"
            else
              NIGHTLY_TAG="nightly-${HUMAN_TS}"
              PEP440_VERSION="${BASE_VERSION}.dev${TIMESTAMP}"
            fi

            WHEEL_FILENAME="aiperf-${PEP440_VERSION}-py3-none-any.whl"
          fi

          echo "nightly_tag=${NIGHTLY_TAG}"       >> "$GITHUB_OUTPUT"
          echo "pep440_version=${PEP440_VERSION}" >> "$GITHUB_OUTPUT"
          echo "wheel_filename=${WHEEL_FILENAME}" >> "$GITHUB_OUTPUT"
          echo "base_version=${BASE_VERSION}"     >> "$GITHUB_OUTPUT"
          echo "run_timestamp=${TIMESTAMP:-reused}" >> "$GITHUB_OUTPUT"

          # Persist for future re-run attempts.
          mkdir -p .nightly-version
          {
            echo "NIGHTLY_TAG=${NIGHTLY_TAG}"
            echo "PEP440_VERSION=${PEP440_VERSION}"
            echo "WHEEL_FILENAME=${WHEEL_FILENAME}"
            echo "BASE_VERSION=${BASE_VERSION}"
            echo "TIMESTAMP=${TIMESTAMP:-reused}"
          } > .nightly-version/version-info.env

      - name: Save version artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-version
          path: .nightly-version/version-info.env
          overwrite: true
          retention-days: 7

  # ============================================================================
  # PHASE 2: VALIDATE
  # pre-commit is a real quality gate. Test jobs are placeholders — replace the
  # single 'echo' step with the actual test command when runners are ready.
  # ============================================================================

  pre-commit:
    name: Pre-commit Checks
    needs: [prepare-nightly]
    runs-on: ubuntu-latest
    if: ${{ inputs.publish_only != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: make first-time-setup PYTHON_VERSION=3.12

      - name: Run pre-commit
        run: |
          . .venv/bin/activate
          pre-commit run --all-files

  unit-tests:
    name: Unit Tests
    needs: [prepare-nightly]
    runs-on: ubuntu-latest
    if: ${{ inputs.publish_only != 'true' }}
    steps:
      - name: Placeholder
        # Replace with: uv run pytest tests/unit/ -n auto
        run: echo "Tests temporarily disabled"

  integration-tests:
    name: Integration Tests
    needs: [prepare-nightly]
    runs-on: ubuntu-latest
    if: ${{ inputs.publish_only != 'true' }}
    steps:
      - name: Placeholder
        # Replace with: uv run pytest -m integration -n auto
        run: echo "Tests temporarily disabled"

  gpu-e2e-tests:
    name: GPU End-to-End Tests
    needs: [prepare-nightly]
    runs-on: ubuntu-latest
    if: ${{ inputs.publish_only != 'true' }}
    steps:
      - name: Placeholder
        # Replace runner label with GPU runner label when provisioned.
        run: echo "GPU runners not yet provisioned"

  # ============================================================================
  # PHASE 3: BUILD
  #
  # No environment: declaration on any build job. Builder runners carry AWS
  # credentials via IAM instance profile and can push to ECR without environment
  # secrets. The automated-release environment gate is enforced later, at publish
  # time only. Attaching it here would require human approval before building,
  # which defeats the purpose of an unattended nightly.
  #
  # Both container builds are pinned to github.sha via actions/checkout default,
  # ensuring identical source trees across arch-specific runners.
  # ============================================================================

  build-wheel:
    name: Build Wheel
    needs: [prepare-nightly, pre-commit, unit-tests, integration-tests, gpu-e2e-tests]
    runs-on: prod-aiperf-builder-amd-v1
    if: ${{ inputs.publish_only != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Patch version in pyproject.toml
        uses: ./.github/actions/update-pyproject-version
        with:
          version: ${{ needs.prepare-nightly.outputs.pep440_version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build wheel via Docker wheel-builder stage
        run: |
          docker buildx build \
            --target wheel-builder \
            --cache-from type=gha,scope=wheel-amd64 \
            --cache-to   type=gha,scope=wheel-amd64,mode=max \
            --output     type=local,dest=./dist/ \
            .

      - name: Detect and validate wheel
        id: wheel
        env:
          EXPECTED_VERSION: ${{ needs.prepare-nightly.outputs.pep440_version }}
        run: |
          set -euo pipefail

          # Detect the actual wheel produced — do not assume pure-Python filename.
          mapfile -t WHEELS < <(find dist/ -name "*.whl" -type f)
          if [ "${#WHEELS[@]}" -eq 0 ]; then
            echo "::error::No wheel found in dist/ after build"
            exit 1
          fi
          if [ "${#WHEELS[@]}" -gt 1 ]; then
            echo "::error::Multiple wheels found in dist/ — expected exactly one:"
            printf '  %s\n' "${WHEELS[@]}"
            exit 1
          fi
          WHEEL_PATH="${WHEELS[0]}"
          echo "Found wheel: ${WHEEL_PATH}"

          # Validate the wheel contains the correct version metadata.
          uvx twine check "${WHEEL_PATH}"
          uv venv .venv-check
          uv pip install --python .venv-check/bin/python "${WHEEL_PATH}"
          INSTALLED_VERSION=$(.venv-check/bin/python -c "import aiperf; print(aiperf.__version__)")
          if [ "${INSTALLED_VERSION}" != "${EXPECTED_VERSION}" ]; then
            echo "::error::Wheel version mismatch: expected '${EXPECTED_VERSION}', got '${INSTALLED_VERSION}'"
            exit 1
          fi
          .venv-check/bin/aiperf --help

          echo "wheel_path=${WHEEL_PATH}" >> "$GITHUB_OUTPUT"
          echo "wheel_filename=$(basename "${WHEEL_PATH}")" >> "$GITHUB_OUTPUT"

      - name: Upload wheel to S3
        env:
          S3_BUCKET:      ${{ secrets.S3_CI_WHEELS_BUCKET }}
          PEP440_VERSION: ${{ needs.prepare-nightly.outputs.pep440_version }}
        run: |
          set -euo pipefail
          WHEEL=$(find dist/ -name "*.whl" | head -1)
          S3_KEY="wheels/aiperf/${PEP440_VERSION}/"
          aws s3 cp "${WHEEL}" "s3://${S3_BUCKET}/${S3_KEY}" --sse AES256
          echo "Uploaded to s3://${S3_BUCKET}/${S3_KEY}"

  build-container:
    name: Build Container (${{ matrix.arch }})
    needs: [prepare-nightly, pre-commit, unit-tests, integration-tests, gpu-e2e-tests]
    if: ${{ inputs.publish_only != 'true' }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: prod-aiperf-builder-amd-v1
          - arch: arm64
            platform: linux/arm64
            runner: prod-aiperf-builder-arm-v1
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Verify checkout SHA
        run: |
          ACTUAL=$(git rev-parse HEAD)
          echo "Building from SHA: ${ACTUAL}"
          echo "Expected SHA:      ${{ github.sha }}"
          # Warn if ref override resulted in a different SHA (expected on manual dispatch).
          if [ "${{ inputs.ref }}" = "" ] && [ "${ACTUAL}" != "${{ github.sha }}" ]; then
            echo "::warning::Checkout SHA ${ACTUAL} does not match github.sha ${{ github.sha }}"
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Patch version in pyproject.toml
        uses: ./.github/actions/update-pyproject-version
        with:
          version: ${{ needs.prepare-nightly.outputs.pep440_version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ECR
        env:
          AWS_ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          aws ecr get-login-password --region "${AWS_DEFAULT_REGION}" \
            | docker login --username AWS --password-stdin \
                "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"

      - name: Build and push ${{ matrix.arch }} image to ECR
        env:
          AWS_ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          PEP440_VERSION:     ${{ needs.prepare-nightly.outputs.pep440_version }}
          ARCH:               ${{ matrix.arch }}
          PLATFORM:           ${{ matrix.platform }}
        run: |
          set -euo pipefail
          REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
          IMAGE_TAG="${PEP440_VERSION}-${ARCH}"

          # Build. For long-running arm64 builds, refresh the ECR token in the
          # background every 6 hours before the 12-hour TTL expires.
          refresh_ecr_token() {
            while sleep 21600; do
              aws ecr get-login-password --region "${AWS_DEFAULT_REGION}" \
                | docker login --username AWS --password-stdin "${REGISTRY}" 2>/dev/null || true
            done
          }
          refresh_ecr_token &
          REFRESH_PID=$!
          trap 'kill ${REFRESH_PID} 2>/dev/null || true' EXIT

          docker buildx build \
            --platform "${PLATFORM}" \
            --target   runtime \
            --cache-from "type=registry,ref=${REGISTRY}/aiperf:cache-${ARCH}" \
            --cache-to   "type=registry,ref=${REGISTRY}/aiperf:cache-${ARCH},mode=max" \
            --push \
            --tag "${REGISTRY}/aiperf:${IMAGE_TAG}" \
            .

          # Verify the pushed image is reachable and record its digest.
          DIGEST=$(docker buildx imagetools inspect "${REGISTRY}/aiperf:${IMAGE_TAG}" \
            --format '{{.Manifest.Digest}}')
          echo "Pushed ${REGISTRY}/aiperf:${IMAGE_TAG} — digest: ${DIGEST}"

  # ============================================================================
  # PHASE 4: STAGE TO INTERMEDIATES
  # ============================================================================

  create-multiarch-manifest-ecr:
    name: Create Multi-arch Manifest (ECR)
    needs: [prepare-nightly, build-container]
    runs-on: prod-aiperf-default-v1
    if: ${{ inputs.publish_only != 'true' }}
    env:
      CRANE_VERSION: v0.20.2
      # SHA256 of go-containerregistry_Linux_x86_64.tar.gz for v0.20.2.
      # Verify at: https://github.com/google/go-containerregistry/releases/tag/v0.20.2
      # Update this value whenever CRANE_VERSION changes.
      CRANE_SHA256: "REPLACE_WITH_SHA256_OF_go-containerregistry_Linux_x86_64.tar.gz"
    steps:
      - name: Install and verify crane
        run: |
          set -euo pipefail
          TARBALL="go-containerregistry_Linux_x86_64.tar.gz"
          curl -fsSL \
            "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/${TARBALL}" \
            -o "${TARBALL}"
          # Checksum verification — protects against supply chain compromise.
          if [ "${CRANE_SHA256}" = "REPLACE_WITH_SHA256_OF_go-containerregistry_Linux_x86_64.tar.gz" ]; then
            echo "::warning::CRANE_SHA256 is a placeholder. Pin the checksum before production use."
          else
            echo "${CRANE_SHA256}  ${TARBALL}" | sha256sum --check
          fi
          tar -xzf "${TARBALL}" crane
          sudo mv crane /usr/local/bin/crane
          rm "${TARBALL}"

      - name: Log in to ECR via crane
        env:
          AWS_ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          aws ecr get-login-password --region "${AWS_DEFAULT_REGION}" \
            | crane auth login \
                "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com" \
                --username AWS --password-stdin

      - name: Verify per-arch images exist and create multi-arch index on ECR
        env:
          AWS_ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          PEP440_VERSION:     ${{ needs.prepare-nightly.outputs.pep440_version }}
        run: |
          set -euo pipefail
          REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
          BASE="${REGISTRY}/aiperf"

          # Verify each arch image is reachable before creating the manifest.
          for ARCH in amd64 arm64; do
            DIGEST=$(crane digest "${BASE}:${PEP440_VERSION}-${ARCH}" 2>&1) || {
              echo "::error::${ARCH} image not found: ${BASE}:${PEP440_VERSION}-${ARCH}"
              exit 1
            }
            echo "${ARCH} image digest: ${DIGEST}"
          done

          # Delete any stale manifest at this tag before recreating, ensuring
          # the result is not a manifest list with duplicate entries on rerun.
          crane delete "${BASE}:${PEP440_VERSION}" 2>/dev/null || true

          crane index append \
            --manifest "${BASE}:${PEP440_VERSION}-amd64" \
            --manifest "${BASE}:${PEP440_VERSION}-arm64" \
            --tag      "${BASE}:${PEP440_VERSION}"

          echo "Multi-arch manifest created: ${BASE}:${PEP440_VERSION}"

  # ============================================================================
  # PHASE 5: COMPLIANCE + SECURITY (run in parallel)
  #
  # Neither job fails itself. Both output a string signal (true|false).
  # create-nightly-tag (phase 6) is the single gate that reads both signals
  # and exits 1 if either is not "true". This ensures pipeline-summary always
  # runs for diagnostics regardless of gate outcome.
  # ============================================================================

  compliance-check:
    name: Compliance Check
    needs: [prepare-nightly, build-wheel, create-multiarch-manifest-ecr]
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() }}
    outputs:
      compliant:             ${{ steps.check.outputs.compliant }}
      compliance_report_url: ${{ steps.check.outputs.compliance_report_url }}
    steps:
      - name: Run compliance check
        id: check
        env:
          PEP440_VERSION: ${{ needs.prepare-nightly.outputs.pep440_version }}
          NIGHTLY_TAG:    ${{ needs.prepare-nightly.outputs.nightly_tag }}
        run: |
          set -euo pipefail
          # ---------------------------------------------------------------
          # PLACEHOLDER: Replace this block with real compliance tooling.
          # Contract: RESULT must be exactly "true" or "false".
          # Preserve compliance_report_url so summary hyperlinks work.
          # ---------------------------------------------------------------
          RESULT="true"
          REPORT_URL="https://placeholder.example.com/compliance/${PEP440_VERSION}"

          # Contract enforcement — real implementation must also satisfy this.
          if [[ "${RESULT}" != "true" && "${RESULT}" != "false" ]]; then
            echo "::error::compliance-check output must be 'true' or 'false', got '${RESULT}'"
            exit 1
          fi

          echo "compliant=${RESULT}"                 >> "$GITHUB_OUTPUT"
          echo "compliance_report_url=${REPORT_URL}" >> "$GITHUB_OUTPUT"
          echo "Compliance result: ${RESULT}"

  trigger-gitlab-security-scan:
    name: GitLab Security Scan
    needs: [prepare-nightly]
    # Self-hosted runner on the NVIDIA internal network — required to reach
    # gitlab-master.nvidia.com which is not publicly accessible.
    runs-on: aiperf-gitlab-runner
    if: ${{ inputs.skip_security_scan != 'true' }}
    outputs:
      scan_passed:         ${{ steps.result.outputs.scan_passed }}
      gitlab_pipeline_id:  ${{ steps.trigger.outputs.pipeline_id }}
      gitlab_pipeline_url: ${{ steps.trigger.outputs.pipeline_url }}
    steps:
      - name: Trigger GitLab pipeline
        id: trigger
        env:
          # GITLAB_TRIGGER_TOKEN is passed via stdin to avoid appearing in
          # /proc/<pid>/cmdline on persistent self-hosted runners (H-2 fix).
          GITLAB_TRIGGER_TOKEN: ${{ secrets.GITLAB_TRIGGER_TOKEN }}
          GITLAB_PIPELINE_URL:  ${{ secrets.GITLAB_PIPELINE_URL }}
          BASE_VERSION:         ${{ needs.prepare-nightly.outputs.base_version }}
          COMMIT_SHA:           ${{ github.sha }}
          GITHUB_RUN_ID:        ${{ github.run_id }}
        run: |
          set -euo pipefail

          # GitLab preflight requires RC_TAG in v<M>.<m>.<p>-rc<N> format.
          # For nightly runs there is no RC number — use rc0 as a placeholder
          # until the GitLab pipeline adds first-class nightly support.
          RC_TAG="v${BASE_VERSION}-rc0"

          # Write token to a temp file so it is not visible in the process list.
          TOKEN_FILE=$(mktemp)
          echo -n "${GITLAB_TRIGGER_TOKEN}" > "${TOKEN_FILE}"
          trap 'rm -f "${TOKEN_FILE}"' EXIT

          RESPONSE=$(curl -fsSL \
            --request POST \
            --form "token=<${TOKEN_FILE}" \
            --form "ref=main" \
            --form "variables[PIPELINE_TYPE]=security" \
            --form "variables[PROJECT]=aiperf" \
            --form "variables[RC_TAG]=${RC_TAG}" \
            --form "variables[ARTIFACTS]=wheel,container" \
            --form "variables[COMMIT_SHA]=${COMMIT_SHA}" \
            --form "variables[GITHUB_RUN_ID]=${GITHUB_RUN_ID}" \
            --form "variables[ENABLE_PULSE_SCAN]=true" \
            --form "variables[ENABLE_WHEEL_SCAN]=true" \
            --form "variables[ENABLE_SONARQUBE]=true" \
            --form "variables[DRY_RUN]=true" \
            "${GITLAB_PIPELINE_URL}")

          PIPELINE_ID=$(echo "${RESPONSE}" | jq -r '.id // empty')
          PIPELINE_URL=$(echo "${RESPONSE}" | jq -r '.web_url // empty')

          if [ -z "${PIPELINE_ID}" ] || [ -z "${PIPELINE_URL}" ]; then
            echo "::error::Failed to trigger GitLab pipeline or parse response"
            echo "${RESPONSE}"
            exit 1
          fi

          echo "pipeline_id=${PIPELINE_ID}"   >> "$GITHUB_OUTPUT"
          echo "pipeline_url=${PIPELINE_URL}" >> "$GITHUB_OUTPUT"
          echo "GitLab pipeline triggered: ${PIPELINE_URL}"

      - name: Poll until GitLab pipeline reaches terminal state
        id: poll
        env:
          GITLAB_API_TOKEN:       ${{ secrets.GITLAB_API_TOKEN }}
          GITLAB_PROJECT_API_URL: ${{ secrets.GITLAB_PROJECT_API_URL }}
          PIPELINE_ID:            ${{ steps.trigger.outputs.pipeline_id }}
        run: |
          set -euo pipefail
          MAX_WAIT=5400   # 90 minutes — Pulse scans can run 30–60 min for large images
          INTERVAL=60
          ELAPSED=0

          # Initialize to a known state so the result step always has a value
          # even if the poll loop exits early due to a curl failure.
          echo "terminal_status=unknown" >> "$GITHUB_OUTPUT"

          while [ "${ELAPSED}" -lt "${MAX_WAIT}" ]; do
            STATUS=$(curl -fsSL \
              --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
              "${GITLAB_PROJECT_API_URL}/pipelines/${PIPELINE_ID}" \
              | jq -r '.status')

            echo "[${ELAPSED}s] GitLab pipeline status: ${STATUS}"

            case "${STATUS}" in
              success|failed|canceled|skipped)
                echo "terminal_status=${STATUS}" >> "$GITHUB_OUTPUT"
                break
                ;;
              created|pending|running|waiting_for_resource|preparing)
                sleep "${INTERVAL}"
                ELAPSED=$((ELAPSED + INTERVAL))
                ;;
              *)
                echo "::warning::Unknown GitLab pipeline status '${STATUS}', continuing to poll"
                sleep "${INTERVAL}"
                ELAPSED=$((ELAPSED + INTERVAL))
                ;;
            esac
          done

          if [ "${ELAPSED}" -ge "${MAX_WAIT}" ]; then
            echo "::error::GitLab pipeline polling timed out after ${MAX_WAIT}s"
            echo "terminal_status=timeout" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Download and validate compliance report
        id: result
        env:
          GITLAB_API_TOKEN:       ${{ secrets.GITLAB_API_TOKEN }}
          GITLAB_PROJECT_API_URL: ${{ secrets.GITLAB_PROJECT_API_URL }}
          PIPELINE_ID:            ${{ steps.trigger.outputs.pipeline_id }}
          TERMINAL_STATUS:        ${{ steps.poll.outputs.terminal_status }}
        run: |
          set -euo pipefail

          if [ "${TERMINAL_STATUS}" != "success" ]; then
            echo "::error::GitLab pipeline ended with status: ${TERMINAL_STATUS}"
            echo "scan_passed=false" >> "$GITHUB_OUTPUT"
            exit 0  # Let create-nightly-tag be the single blocking point.
          fi

          # Find the compliance-check job by name within this pipeline.
          JOB_ID=$(curl -fsSL \
            --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
            "${GITLAB_PROJECT_API_URL}/pipelines/${PIPELINE_ID}/jobs" \
            | jq -r '.[] | select(.name == "compliance-check") | .id // empty' \
            | head -1)

          if [ -z "${JOB_ID}" ]; then
            echo "::error::compliance-check job not found in GitLab pipeline ${PIPELINE_ID}"
            echo "scan_passed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          curl -fsSL \
            --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
            --output compliance-report.json \
            "${GITLAB_PROJECT_API_URL}/jobs/${JOB_ID}/artifacts/compliance-report.json"

          # Strict validation of compliance_passed before writing to GITHUB_OUTPUT.
          # Prevents newline-injection attacks from tampered GitLab artifacts.
          RAW=$(jq -r '.compliance_passed' compliance-report.json)
          if [[ "${RAW}" != "true" && "${RAW}" != "false" ]]; then
            echo "::error::compliance_passed has unexpected value: ${RAW}"
            echo "scan_passed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "scan_passed=${RAW}" >> "$GITHUB_OUTPUT"
          echo "GitLab compliance_passed: ${RAW}"

  # Job stub when skip_security_scan=true so create-nightly-tag always has
  # the scan_passed output available via its needs context.
  security-scan-skipped:
    name: Security Scan (skipped)
    needs: [prepare-nightly]
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_security_scan == 'true' }}
    outputs:
      scan_passed:         ${{ steps.skip.outputs.scan_passed }}
      gitlab_pipeline_id:  ${{ steps.skip.outputs.gitlab_pipeline_id }}
      gitlab_pipeline_url: ${{ steps.skip.outputs.gitlab_pipeline_url }}
    steps:
      - name: Record skip
        id: skip
        run: |
          echo "::warning::GitLab security scan was explicitly skipped via workflow input."
          echo "This must be justified by the operator triggering this run."
          echo "scan_passed=skipped"      >> "$GITHUB_OUTPUT"
          echo "gitlab_pipeline_id="     >> "$GITHUB_OUTPUT"
          echo "gitlab_pipeline_url="    >> "$GITHUB_OUTPUT"

  # ============================================================================
  # PHASE 6: TAG
  #
  # Single blocking point for compliance gates. Exits 1 if either gate output
  # is not "true". "skipped" (scan bypassed via input) is allowed to pass here
  # but is logged as a warning in the step summary.
  #
  # No environment: declaration — tag push uses NIGHTLY_GITHUB_PAT directly.
  # The automated-release environment gate is reserved for phase 7 (human approval).
  # ============================================================================

  create-nightly-tag:
    name: Create Nightly Tag
    needs:
      - prepare-nightly
      - compliance-check
      - trigger-gitlab-security-scan
      - security-scan-skipped
    runs-on: ubuntu-latest
    if: ${{ always() && needs.prepare-nightly.result == 'success' }}
    steps:
      - name: Evaluate compliance and security gates
        env:
          COMPLIANT:   ${{ needs.compliance-check.outputs.compliant }}
          SCAN_PASSED: ${{ needs.trigger-gitlab-security-scan.outputs.scan_passed || needs.security-scan-skipped.outputs.scan_passed }}
        run: |
          set -euo pipefail
          FAILED=()

          [ "${COMPLIANT}"   = "true" ] || FAILED+=("compliance-check (result: ${COMPLIANT})")

          if [ "${SCAN_PASSED}" = "skipped" ]; then
            echo "::warning::Security scan was skipped. This run will be tagged but the skip is recorded."
          elif [ "${SCAN_PASSED}" != "true" ]; then
            FAILED+=("gitlab-security-scan (result: ${SCAN_PASSED})")
          fi

          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "::error::Pipeline blocked — the following gates did not pass:"
            printf '::error::  - %s\n' "${FAILED[@]}"
            exit 1
          fi
          echo "All gates passed."

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.NIGHTLY_GITHUB_PAT }}
          ref: ${{ inputs.ref || github.ref }}

      - name: Push nightly tag (idempotent)
        env:
          NIGHTLY_TAG: ${{ needs.prepare-nightly.outputs.nightly_tag }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Idempotency: skip tag creation if this tag already points to the same commit.
          EXISTING_SHA=$(git ls-remote origin "refs/tags/${NIGHTLY_TAG}" | awk '{print $1}')
          HEAD_SHA=$(git rev-parse HEAD)

          if [ -n "${EXISTING_SHA}" ]; then
            # Annotated tags: the ls-remote returns the tag object SHA, not commit SHA.
            # Dereference with ^{} to get the commit SHA.
            COMMIT_SHA=$(git ls-remote origin "refs/tags/${NIGHTLY_TAG}^{}" | awk '{print $1}')
            if [ "${COMMIT_SHA:-${EXISTING_SHA}}" = "${HEAD_SHA}" ]; then
              echo "Tag ${NIGHTLY_TAG} already exists at ${HEAD_SHA} — skipping tag creation."
              exit 0
            else
              echo "::error::Tag ${NIGHTLY_TAG} already exists but points to ${COMMIT_SHA:-${EXISTING_SHA}}, not ${HEAD_SHA}."
              echo "::error::This indicates a version collision. Investigate before proceeding."
              exit 1
            fi
          fi

          git tag -a "${NIGHTLY_TAG}" -m "Nightly build ${NIGHTLY_TAG}"
          git push origin "${NIGHTLY_TAG}"
          echo "Tag pushed: ${NIGHTLY_TAG}"

  # ============================================================================
  # PHASE 7: RELEASE GATE
  #
  # Pure no-op. The automated-release environment is configured with required
  # reviewers in GitHub settings, which causes this job to pause in "Waiting"
  # state until a reviewer approves, rejects, or the 24-hour environment timeout
  # expires. Configure this timeout in GitHub UI:
  #   Repository Settings > Environments > automated-release > Environment timeout
  #
  # Outcome:
  #   Approved  → phase 8 publish jobs run
  #   Rejected  → pipeline fails; publish jobs are skipped
  #   Timeout   → job cancelled; publish jobs are skipped; next nightly starts fresh
  # ============================================================================

  release-approval-gate:
    name: Release Approval Gate
    needs: [prepare-nightly, create-nightly-tag]
    runs-on: ubuntu-latest
    environment: automated-release
    steps:
      - name: Summarize artifacts pending approval
        env:
          NIGHTLY_TAG:    ${{ needs.prepare-nightly.outputs.nightly_tag }}
          PEP440_VERSION: ${{ needs.prepare-nightly.outputs.pep440_version }}
        run: |
          {
            echo "## Pending Release Approval"
            echo ""
            echo "Approve this gate to publish the following nightly artifacts."
            echo ""
            echo "| Artifact | Destination |"
            echo "|----------|-------------|"
            echo "| Python wheel \`${PEP440_VERSION}\` | Artifactory (internal) |"
            echo "| Container \`${PEP440_VERSION}\` (amd64 + arm64) | NGC (nvcr.io) |"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Nightly tag | \`${NIGHTLY_TAG}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # PHASE 8: PUBLISH
  #
  # Explicit if: guard on every publish job as defense-in-depth — never rely
  # solely on implicit needs-based skip propagation for publish authorization.
  # ============================================================================

  publish-wheel-to-artifactory:
    name: Publish Wheel to Artifactory
    needs: [prepare-nightly, release-approval-gate, build-wheel]
    runs-on: prod-aiperf-default-v1
    environment: automated-release
    if: ${{ needs.release-approval-gate.result == 'success' }}
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Copy wheel from S3 to Artifactory
        env:
          S3_BUCKET:         ${{ secrets.S3_CI_WHEELS_BUCKET }}
          ARTIFACTORY_URL:   ${{ secrets.ARTIFACTORY_URL }}
          ARTIFACTORY_USER:  ${{ secrets.ARTIFACTORY_USER }}
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
          PEP440_VERSION:    ${{ needs.prepare-nightly.outputs.pep440_version }}
        run: |
          set -euo pipefail
          TMPDIR=$(mktemp -d)
          trap 'rm -rf "${TMPDIR}"' EXIT

          aws s3 cp \
            "s3://${S3_BUCKET}/wheels/aiperf/${PEP440_VERSION}/" \
            "${TMPDIR}/" --recursive --include "*.whl"

          # Validate exactly one wheel was downloaded.
          mapfile -t WHEELS < <(find "${TMPDIR}" -name "*.whl" -type f)
          if [ "${#WHEELS[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one wheel from S3, found ${#WHEELS[@]}"
            exit 1
          fi

          TWINE_NON_INTERACTIVE=1 uvx twine upload \
            --repository-url "${ARTIFACTORY_URL}" \
            --username        "${ARTIFACTORY_USER}" \
            --password        "${ARTIFACTORY_TOKEN}" \
            --disable-progress-bar \
            "${WHEELS[0]}"

          # Log artifact location without expanding secret URL.
          echo "Wheel published to Artifactory for version ${PEP440_VERSION}"

  publish-container-to-ngc:
    name: Publish Container to NGC
    needs: [prepare-nightly, release-approval-gate, create-multiarch-manifest-ecr]
    runs-on: prod-aiperf-default-v1
    environment: automated-release
    if: ${{ needs.release-approval-gate.result == 'success' }}
    env:
      CRANE_VERSION: v0.20.2
      CRANE_SHA256: "REPLACE_WITH_SHA256_OF_go-containerregistry_Linux_x86_64.tar.gz"
    steps:
      - name: Install and verify crane
        run: |
          set -euo pipefail
          TARBALL="go-containerregistry_Linux_x86_64.tar.gz"
          curl -fsSL \
            "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/${TARBALL}" \
            -o "${TARBALL}"
          if [ "${CRANE_SHA256}" = "REPLACE_WITH_SHA256_OF_go-containerregistry_Linux_x86_64.tar.gz" ]; then
            echo "::warning::CRANE_SHA256 is a placeholder. Pin the checksum before production use."
          else
            echo "${CRANE_SHA256}  ${TARBALL}" | sha256sum --check
          fi
          tar -xzf "${TARBALL}" crane
          sudo mv crane /usr/local/bin/crane
          rm "${TARBALL}"

      - name: Log in to ECR and NGC
        env:
          AWS_ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          NGC_TOKEN:          ${{ secrets.NGC_PUBLISH_TOKEN }}
          NGC_USERNAME:       ${{ secrets.NGC_PUBLISH_USERNAME }}
        run: |
          aws ecr get-login-password --region "${AWS_DEFAULT_REGION}" \
            | crane auth login \
                "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com" \
                --username AWS --password-stdin
          echo "${NGC_TOKEN}" | crane auth login nvcr.io \
            --username "${NGC_USERNAME}" --password-stdin

      - name: Copy multi-arch images from ECR to NGC
        env:
          AWS_ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          NGC_ORG:            ${{ secrets.NGC_PUBLISH_ORG }}
          PEP440_VERSION:     ${{ needs.prepare-nightly.outputs.pep440_version }}
        run: |
          set -euo pipefail
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
          NGC_IMAGE="nvcr.io/${NGC_ORG}/aiperf"

          # Copy arch-specific images.
          for ARCH in amd64 arm64; do
            crane copy \
              "${ECR_REGISTRY}/aiperf:${PEP440_VERSION}-${ARCH}" \
              "${NGC_IMAGE}:${PEP440_VERSION}-${ARCH}"
          done

          # Delete any stale manifest before recreating (idempotent on rerun).
          crane delete "${NGC_IMAGE}:${PEP440_VERSION}" 2>/dev/null || true

          # Create the multi-arch index on NGC.
          crane index append \
            --manifest "${NGC_IMAGE}:${PEP440_VERSION}-amd64" \
            --manifest "${NGC_IMAGE}:${PEP440_VERSION}-arm64" \
            --tag      "${NGC_IMAGE}:${PEP440_VERSION}"

          # Also update the mutable nightly-latest tag so developers can always
          # pull the most recent successful nightly without knowing the version.
          crane tag "${NGC_IMAGE}:${PEP440_VERSION}" nightly-latest

          # Log without expanding NGC_ORG secret.
          echo "Container published to NGC for version ${PEP440_VERSION}"

  # ============================================================================
  # PHASE 9: SUMMARY
  #
  # Runs unconditionally via if: always(). Reports all job outcomes in a single
  # table and emits a Slack notification on failure.
  # ============================================================================

  pipeline-summary:
    name: Pipeline Summary
    needs:
      - prepare-nightly
      - pre-commit
      - unit-tests
      - integration-tests
      - gpu-e2e-tests
      - build-wheel
      - build-container
      - create-multiarch-manifest-ecr
      - compliance-check
      - trigger-gitlab-security-scan
      - security-scan-skipped
      - create-nightly-tag
      - release-approval-gate
      - publish-wheel-to-artifactory
      - publish-container-to-ngc
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write pipeline summary
        env:
          NIGHTLY_TAG:     ${{ needs.prepare-nightly.outputs.nightly_tag }}
          PEP440_VERSION:  ${{ needs.prepare-nightly.outputs.pep440_version }}
          COMPLIANT:       ${{ needs.compliance-check.outputs.compliant }}
          COMPLIANCE_URL:  ${{ needs.compliance-check.outputs.compliance_report_url }}
          SCAN_PASSED:     ${{ needs.trigger-gitlab-security-scan.outputs.scan_passed || needs.security-scan-skipped.outputs.scan_passed }}
          GITLAB_URL:      ${{ needs.trigger-gitlab-security-scan.outputs.gitlab_pipeline_url }}
          APPROVAL_RESULT: ${{ needs.release-approval-gate.result }}
        run: |
          # Translate approval gate result into a human-readable explanation.
          case "${APPROVAL_RESULT}" in
            success)   APPROVAL_STATUS="Approved — publish ran" ;;
            failure)   APPROVAL_STATUS="Rejected by reviewer" ;;
            cancelled) APPROVAL_STATUS="Approval window expired (24 h timeout)" ;;
            skipped)   APPROVAL_STATUS="Not reached (pipeline blocked upstream)" ;;
            *)         APPROVAL_STATUS="${APPROVAL_RESULT}" ;;
          esac

          {
            echo "## Nightly Pipeline Summary"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Tag | \`${NIGHTLY_TAG}\` |"
            echo "| Version | \`${PEP440_VERSION}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Trigger | ${{ github.event_name }} |"
            echo ""
            echo "### Quality Gates"
            echo "| Gate | Result |"
            echo "|------|--------|"
            echo "| pre-commit | ${{ needs.pre-commit.result }} |"
            echo "| unit-tests | ${{ needs.unit-tests.result }} |"
            echo "| integration-tests | ${{ needs.integration-tests.result }} |"
            echo "| gpu-e2e-tests | ${{ needs.gpu-e2e-tests.result }} |"
            echo "| compliance-check | ${COMPLIANT:-unknown} — [report](${COMPLIANCE_URL}) |"
            echo "| security-scan | ${SCAN_PASSED:-unknown}${GITLAB_URL:+ — [GitLab pipeline](${GITLAB_URL})} |"
            echo ""
            echo "### Build + Stage"
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| build-wheel (+ S3 upload) | ${{ needs.build-wheel.result }} |"
            echo "| build-container (+ ECR push) | ${{ needs.build-container.result }} |"
            echo "| create-multiarch-manifest-ecr | ${{ needs.create-multiarch-manifest-ecr.result }} |"
            echo ""
            echo "### Release"
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| create-nightly-tag | ${{ needs.create-nightly-tag.result }} |"
            echo "| release-approval-gate | ${{ needs.release-approval-gate.result }} — ${APPROVAL_STATUS} |"
            echo "| publish-wheel-to-artifactory | ${{ needs.publish-wheel-to-artifactory.result }} |"
            echo "| publish-container-to-ngc | ${{ needs.publish-container-to-ngc.result }} |"
            echo ""
            if [ "${{ needs.publish-container-to-ngc.result }}" = "success" ]; then
              echo "### Published"
              echo "- Container: \`nvcr.io/<org>/aiperf:${PEP440_VERSION}\` (amd64 + arm64 + nightly-latest)"
              echo "- Wheel: Artifactory \`aiperf/${PEP440_VERSION}/\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure
        # Fires only if any upstream job failed (not cancelled, not skipped).
        if: ${{ failure() }}
        env:
          NIGHTLY_TAG:   ${{ needs.prepare-nightly.outputs.nightly_tag }}
          RUN_URL:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_WEBHOOK: ${{ secrets.NIGHTLY_SLACK_WEBHOOK }}
        run: |
          if [ -z "${SLACK_WEBHOOK}" ]; then
            echo "::warning::NIGHTLY_SLACK_WEBHOOK is not configured — skipping failure notification"
            exit 0
          fi
          curl -fsSL \
            --request POST \
            --header "Content-Type: application/json" \
            --data "{\"text\":\"Nightly pipeline failed: ${NIGHTLY_TAG}\n${RUN_URL}\"}" \
            "${SLACK_WEBHOOK}"
