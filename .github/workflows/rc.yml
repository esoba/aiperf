name: RC

on:
  push:
    branches:
      - 'pvijayakrish/automate-release-rc'

permissions:
  contents: write
  packages: write

jobs:
  # ============================================================================
  # GATE: Authorization + Version Resolution
  # ============================================================================

  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      rc_number: ${{ steps.rc.outputs.rc_number }}
      rc_tag: ${{ steps.rc.outputs.rc_tag }}
      pep440_version: ${{ steps.rc.outputs.pep440_version }}
      wheel_filename: ${{ steps.rc.outputs.wheel_filename }}
    steps:
      - name: Set test version
        id: extract
        run: |
          set -euo pipefail
          VERSION="0.0.0"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine RC number
        id: rc
        env:
          VERSION: ${{ steps.extract.outputs.version }}
        run: |
          set -euo pipefail

          RC_PATTERN="v${VERSION}-rc"
          EXISTING_RCS=$(git tag -l "${RC_PATTERN}*" | grep -E "^v${VERSION}-rc[0-9]+$" | sort -V || true)

          if [ -z "${EXISTING_RCS}" ]; then
            NEXT_RC=0
          else
            LAST_RC=$(echo "${EXISTING_RCS}" | tail -1)
            LAST_RC_NUM=${LAST_RC#v${VERSION}-rc}
            NEXT_RC=$((LAST_RC_NUM + 1))
          fi

          RC_TAG="v${VERSION}-rc${NEXT_RC}"
          PEP440_VERSION="${VERSION}rc${NEXT_RC}"
          WHEEL_FILENAME="aiperf-${PEP440_VERSION}-py3-none-any.whl"

          echo "rc_number=${NEXT_RC}" >> "$GITHUB_OUTPUT"
          echo "rc_tag=${RC_TAG}" >> "$GITHUB_OUTPUT"
          echo "pep440_version=${PEP440_VERSION}" >> "$GITHUB_OUTPUT"
          echo "wheel_filename=${WHEEL_FILENAME}" >> "$GITHUB_OUTPUT"

  # ============================================================================
  # QUALITY GATES
  # ============================================================================

  pre-commit:
    name: Pre-commit Checks
    needs: [prepare-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: make first-time-setup PYTHON_VERSION=3.12

      - name: Run pre-commit
        run: |
          . .venv/bin/activate
          pre-commit run --all-files

  unit-tests:
    name: Unit Tests (temporarily skipped)
    needs: [prepare-release]
    runs-on: ubuntu-latest
    steps:
      - name: Skip
        run: echo "Temporarily skipped"

  integration-tests:
    name: Integration Tests (temporarily skipped)
    needs: [prepare-release]
    runs-on: ubuntu-latest
    steps:
      - name: Skip
        run: echo "Temporarily skipped"

  gpu-e2e-tests:
    name: GPU End-to-End Tests (skipped - no GPU runner)
    needs: [prepare-release]
    runs-on: ubuntu-latest
    steps:
      - name: Skip
        run: echo "Skipped - GPU runners not yet available"

  # ============================================================================
  # BUILD ARTIFACTS
  # ============================================================================

  build-wheel:
    name: Build Wheel
    needs: [prepare-release]
    runs-on: prod-aiperf-builder-amd-v1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Patch version for RC
        uses: ./.github/actions/update-pyproject-version
        with:
          version: ${{ needs.prepare-release.outputs.pep440_version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build wheel-builder stage and extract wheel
        run: |
          docker buildx build \
            --target wheel-builder \
            --cache-from type=gha,scope=amd64 \
            --cache-to type=gha,mode=max,scope=amd64 \
            --output type=local,dest=./wheel-out/ \
            .

      - name: Verify wheel exists
        env:
          EXPECTED_WHEEL: ${{ needs.prepare-release.outputs.wheel_filename }}
        run: |
          if [ ! -f "wheel-out/dist/${EXPECTED_WHEEL}" ]; then
            echo "::error::Expected wheel not found: wheel-out/dist/${EXPECTED_WHEEL}"
            exit 1
          fi
          ls -la wheel-out/dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: aiperf-wheel
          path: wheel-out/dist/*.whl
          retention-days: 30

  validate-wheel:
    name: Validate Wheel
    needs: [prepare-release, build-wheel]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validation tools
        run: pip install --upgrade pip twine

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: aiperf-wheel
          path: dist/

      - name: Run twine check
        run: twine check dist/*.whl

      - name: Validate license metadata
        run: |
          set -euo pipefail
          WHEEL=$(ls dist/*.whl)
          python -m zipfile -l "${WHEEL}" | grep -i license || {
            echo "::warning::No LICENSE file found in wheel"
          }

      - name: Smoke test import
        run: |
          pip install dist/*.whl
          python -c "import aiperf; print(f'aiperf version: {aiperf.__version__}')"
          aiperf --help

  build-container:
    name: Build Container (${{ matrix.arch }})
    needs: [prepare-release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: prod-aiperf-builder-amd-v1
          - arch: arm64
            platform: linux/arm64
            runner: prod-aiperf-builder-arm-v1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Patch version for RC
        uses: ./.github/actions/update-pyproject-version
        with:
          version: ${{ needs.prepare-release.outputs.pep440_version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export runtime image
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --target runtime \
            --cache-from type=gha,scope=${{ matrix.arch }} \
            --cache-to type=gha,mode=max,scope=${{ matrix.arch }} \
            --output type=oci,dest=aiperf-${{ matrix.arch }}.tar \
            .

      - name: Upload container artifact
        uses: actions/upload-artifact@v4
        with:
          name: aiperf-container-${{ matrix.arch }}
          path: aiperf-${{ matrix.arch }}.tar
          retention-days: 7

  # ============================================================================
  # TAG
  # ============================================================================

  create-rc-tag:
    name: Create RC Tag
    needs:
      - prepare-release
      - pre-commit
      - unit-tests
      - integration-tests
      - gpu-e2e-tests
      - validate-wheel
      - build-container
    runs-on: ubuntu-latest
    environment: automated-release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push RC tag
        env:
          RC_TAG: ${{ needs.prepare-release.outputs.rc_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${RC_TAG}" -m "Release candidate ${RC_TAG}"
          git push origin "${RC_TAG}"

      - name: Release summary
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
          RC_TAG: ${{ needs.prepare-release.outputs.rc_tag }}
          RC_NUMBER: ${{ needs.prepare-release.outputs.rc_number }}
          PEP440_VERSION: ${{ needs.prepare-release.outputs.pep440_version }}
          WHEEL_FILENAME: ${{ needs.prepare-release.outputs.wheel_filename }}
          GPU_TEST_RESULT: ${{ needs.gpu-e2e-tests.result }}
        run: |
          {
            echo "## RC Release Summary"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Version | ${VERSION} |"
            echo "| RC Number | ${RC_NUMBER} |"
            echo "| Git Tag | \`${RC_TAG}\` |"
            echo "| PEP 440 Version | \`${PEP440_VERSION}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Wheel | \`${WHEEL_FILENAME}\` |"
            echo ""
            echo "### Quality Gates"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Pre-commit | ${{ needs.pre-commit.result }} |"
            echo "| Unit Tests | ${{ needs.unit-tests.result }} |"
            echo "| Integration Tests | ${{ needs.integration-tests.result }} |"
            echo "| GPU E2E Tests | ${GPU_TEST_RESULT} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # STAGE ARTIFACTS
  # ============================================================================

  stage-container:
    name: Stage Container
    needs: [prepare-release, create-rc-tag]
    runs-on: prod-aiperf-default-v1
    environment: automated-release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute image references
        id: refs
        env:
          PEP440_VERSION: ${{ needs.prepare-release.outputs.pep440_version }}
        run: |
          set -euo pipefail
          IMDS_TOKEN="$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 60")"
          AWS_REGION="$(curl -s -H "X-aws-ec2-metadata-token: ${IMDS_TOKEN}" http://169.254.169.254/latest/meta-data/placement/region)"
          ACCOUNT_ID="$(aws sts get-caller-identity --region "${AWS_REGION}" --query Account --output text)"
          ECR_HOSTNAME="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE="${ECR_HOSTNAME}/ai-dynamo/aiperf"
          echo "aws_region=${AWS_REGION}" >> "$GITHUB_OUTPUT"
          echo "ecr_hostname=${ECR_HOSTNAME}" >> "$GITHUB_OUTPUT"
          echo "amd64_ref=${IMAGE}:${PEP440_VERSION}-amd64" >> "$GITHUB_OUTPUT"
          echo "arm64_ref=${IMAGE}:${PEP440_VERSION}-arm64" >> "$GITHUB_OUTPUT"
          echo "multiarch_ref=${IMAGE}:${PEP440_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        env:
          ECR_HOSTNAME: ${{ steps.refs.outputs.ecr_hostname }}
          AWS_REGION: ${{ steps.refs.outputs.aws_region }}
        run: |
          aws ecr get-login-password --region "${AWS_REGION}" \
            | skopeo login "${ECR_HOSTNAME}" --username AWS --password-stdin

      - name: Download amd64 container artifact
        uses: actions/download-artifact@v4
        with:
          name: aiperf-container-amd64
          path: artifacts/

      - name: Download arm64 container artifact
        uses: actions/download-artifact@v4
        with:
          name: aiperf-container-arm64
          path: artifacts/

      - name: Push amd64 image
        env:
          IMAGE_REF: ${{ steps.refs.outputs.amd64_ref }}
        run: |
          skopeo copy \
            oci-archive:artifacts/aiperf-amd64.tar \
            "docker://${IMAGE_REF}"

      - name: Push arm64 image
        env:
          IMAGE_REF: ${{ steps.refs.outputs.arm64_ref }}
        run: |
          skopeo copy \
            oci-archive:artifacts/aiperf-arm64.tar \
            "docker://${IMAGE_REF}"

      - name: Create and push multi-arch manifest
        env:
          ECR_HOSTNAME: ${{ steps.refs.outputs.ecr_hostname }}
          AWS_REGION: ${{ steps.refs.outputs.aws_region }}
          MULTIARCH_REF: ${{ steps.refs.outputs.multiarch_ref }}
          AMD64_REF: ${{ steps.refs.outputs.amd64_ref }}
          ARM64_REF: ${{ steps.refs.outputs.arm64_ref }}
        run: |
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login "${ECR_HOSTNAME}" --username AWS --password-stdin
          docker manifest create "${MULTIARCH_REF}" "${AMD64_REF}" "${ARM64_REF}"
          docker manifest push "${MULTIARCH_REF}"

      - name: Logout from container registry
        if: always()
        env:
          ECR_HOSTNAME: ${{ steps.refs.outputs.ecr_hostname }}
        run: |
          docker logout "${ECR_HOSTNAME}" 2>/dev/null || true
          skopeo logout "${ECR_HOSTNAME}" 2>/dev/null || true

  stage-wheel:
    name: Stage Wheel
    needs: [prepare-release, create-rc-tag, validate-wheel]
    runs-on: prod-aiperf-default-v1
    environment: automated-release
    steps:
      - name: Set up Python and twine
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv python3.12-venv
          python3 -m venv /tmp/wheel-venv
          source /tmp/wheel-venv/bin/activate
          pip install --upgrade pip twine
          echo "/tmp/wheel-venv/bin" >> "$GITHUB_PATH"

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: aiperf-wheel
          path: dist/

      - name: Publish wheel to Artifactory
        env:
          ARTIFACTORY_URL: ${{ secrets.ARTIFACTORY_URL }}
          ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
          TWINE_NON_INTERACTIVE: "1"
          PEP440_VERSION: ${{ needs.prepare-release.outputs.pep440_version }}
        run: |
          set -euo pipefail
          twine upload \
            --repository-url "${ARTIFACTORY_URL}" \
            --username "${ARTIFACTORY_USER}" \
            --password "${ARTIFACTORY_TOKEN}" \
            --disable-progress-bar \
            dist/*.whl
          {
            echo "### Artifactory Upload"
            echo "- **Repository**: \`${ARTIFACTORY_URL}\`"
            echo "- **Package**: \`aiperf==${PEP440_VERSION}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # TRIGGER GITLAB RELEASE AUTOMATION
  #
  # nSpect registration, Pulse container scans, and wheeltamer wheel scans
  # run on GitLab because GitHub AWS runners cannot reach internal NVIDIA
  # endpoints (nSpect API, Pulse, sonar.nvidia.com).
  #
  # This job triggers the release-automation GitLab pipeline which performs:
  #   1. Pulse container vulnerability scan (aiperf amd64 + arm64)
  #   2. Wheeltamer wheel security scan (aiperf wheel)
  #   3. nSpect registration (wheel URL + container image URL)
  #
  # Required secrets (in the automated-release environment):
  #   GITLAB_TRIGGER_TOKEN  -- GitLab pipeline trigger token
  #   GITLAB_PIPELINE_URL   -- https://gitlab-master.nvidia.com/api/v4/projects/<ID>/trigger/pipeline
  # ============================================================================

  trigger-gitlab-pipeline:
    name: Trigger GitLab Release Automation
    needs: [prepare-release, stage-container, stage-wheel]
    runs-on: github-ci-runner01
    environment: automated-release
    steps:
      - name: Trigger GitLab RC pipeline
        env:
          RC_TAG: ${{ needs.prepare-release.outputs.rc_tag }}
          PEP440_VERSION: ${{ needs.prepare-release.outputs.pep440_version }}
          WHEEL_FILENAME: ${{ needs.prepare-release.outputs.wheel_filename }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TRIGGER_TOKEN }}
          GITLAB_URL: ${{ secrets.GITLAB_PIPELINE_URL }}
        run: |
          set -euo pipefail

          echo "=== Triggering GitLab Release Automation ==="
          echo "Project:     aiperf"
          echo "RC Tag:      ${RC_TAG}"
          echo "PEP440:      ${PEP440_VERSION}"
          echo "Wheel:       ${WHEEL_FILENAME}"
          echo "Commit SHA:  ${{ github.sha }}"
          echo "Run ID:      ${{ github.run_id }}"

          HTTP_CODE=$(curl -sS -o /tmp/gitlab_trigger.json -w "%{http_code}" \
            --fail-with-body \
            --request POST \
            --form token="${GITLAB_TOKEN}" \
            --form ref=main \
            --form "variables[PIPELINE_TYPE]=rc" \
            --form "variables[PROJECT]=aiperf" \
            --form "variables[RC_TAG]=${RC_TAG}" \
            --form "variables[PEP440_VERSION]=${PEP440_VERSION}" \
            --form "variables[COMMIT_SHA]=${{ github.sha }}" \
            --form "variables[GITHUB_RUN_ID]=${{ github.run_id }}" \
            --form "variables[ARTIFACTS]=wheel,container" \
            --form "variables[ENABLE_PULSE_SCAN]=true" \
            --form "variables[ENABLE_WHEEL_SCAN]=true" \
            --form "variables[ENABLE_SONARQUBE]=false" \
            "${GITLAB_URL}")

          echo "GitLab API HTTP status: ${HTTP_CODE}"

          PIPELINE_URL=$(jq -r '.web_url // empty' /tmp/gitlab_trigger.json)
          PIPELINE_ID=$(jq -r '.id // empty' /tmp/gitlab_trigger.json)
          rm -f /tmp/gitlab_trigger.json

          if [ -z "${PIPELINE_URL}" ]; then
            echo "::error::Failed to trigger GitLab pipeline (HTTP ${HTTP_CODE})"
            exit 1
          fi

          echo "GitLab pipeline triggered: ${PIPELINE_URL}"

          {
            echo "### GitLab Release Automation"
            echo "- **Pipeline**: [${PIPELINE_ID}](${PIPELINE_URL})"
            echo "- **Type**: RC (security scans + nSpect registration)"
            echo "- **Project**: aiperf"
            echo "- **RC Tag**: \`${RC_TAG}\`"
            echo ""
            echo "The GitLab pipeline will:"
            echo "1. Run Pulse container vulnerability scans"
            echo "2. Run wheeltamer wheel security scan"
            echo "3. Register artifacts with nSpect"
          } >> "$GITHUB_STEP_SUMMARY"
