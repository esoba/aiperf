name: RC

on:
  push:
    branches:
      - 'pvijayakrish/automate-release-rc'

permissions:
  contents: write
  packages: write

jobs:
  # ============================================================================
  # GATE: Authorization + Version Resolution
  # ============================================================================

  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      rc_number: ${{ steps.rc.outputs.rc_number }}
      rc_tag: ${{ steps.rc.outputs.rc_tag }}
      pep440_version: ${{ steps.rc.outputs.pep440_version }}
      wheel_filename: ${{ steps.rc.outputs.wheel_filename }}
    steps:
      - name: Set test version
        id: extract
        run: |
          set -euo pipefail
          VERSION="0.0.0"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine RC number
        id: rc
        env:
          VERSION: ${{ steps.extract.outputs.version }}
        run: |
          set -euo pipefail

          RC_PATTERN="v${VERSION}-rc"
          EXISTING_RCS=$(git tag -l "${RC_PATTERN}*" | grep -E "^v${VERSION}-rc[0-9]+$" | sort -V || true)

          if [ -z "${EXISTING_RCS}" ]; then
            NEXT_RC=0
          else
            LAST_RC=$(echo "${EXISTING_RCS}" | tail -1)
            LAST_RC_NUM=${LAST_RC#v${VERSION}-rc}
            NEXT_RC=$((LAST_RC_NUM + 1))
          fi

          RC_TAG="v${VERSION}-rc${NEXT_RC}"
          PEP440_VERSION="${VERSION}rc${NEXT_RC}"
          WHEEL_FILENAME="aiperf-${PEP440_VERSION}-py3-none-any.whl"

          echo "rc_number=${NEXT_RC}" >> "$GITHUB_OUTPUT"
          echo "rc_tag=${RC_TAG}" >> "$GITHUB_OUTPUT"
          echo "pep440_version=${PEP440_VERSION}" >> "$GITHUB_OUTPUT"
          echo "wheel_filename=${WHEEL_FILENAME}" >> "$GITHUB_OUTPUT"

  # ============================================================================
  # QUALITY GATES
  # ============================================================================

  pre-commit:
    name: Pre-commit Checks
    needs: [prepare-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: make first-time-setup PYTHON_VERSION=3.12

      - name: Run pre-commit
        run: |
          . .venv/bin/activate
          pre-commit run --all-files

  unit-tests:
    name: Unit Tests (temporarily skipped)
    needs: [prepare-release]
    runs-on: ubuntu-latest
    steps:
      - name: Skip
        run: echo "Temporarily skipped"

  integration-tests:
    name: Integration Tests (temporarily skipped)
    needs: [prepare-release]
    runs-on: ubuntu-latest
    steps:
      - name: Skip
        run: echo "Temporarily skipped"

  gpu-e2e-tests:
    name: GPU End-to-End Tests (skipped - no GPU runner)
    needs: [prepare-release]
    runs-on: ubuntu-latest
    steps:
      - name: Skip
        run: echo "Skipped - GPU runners not yet available"

  # ============================================================================
  # BUILD ARTIFACTS
  # ============================================================================

  build-wheel:
    name: Build Wheel
    needs: [prepare-release]
    runs-on: prod-aiperf-builder-amd-v1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Patch version for RC
        uses: ./.github/actions/update-pyproject-version
        with:
          version: ${{ needs.prepare-release.outputs.pep440_version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build wheel-builder stage and extract wheel
        run: |
          docker buildx build \
            --target wheel-builder \
            --cache-from type=gha,scope=amd64 \
            --cache-to type=gha,mode=max,scope=amd64 \
            --output type=local,dest=./wheel-out/ \
            .

      - name: Verify wheel exists
        env:
          EXPECTED_WHEEL: ${{ needs.prepare-release.outputs.wheel_filename }}
        run: |
          if [ ! -f "wheel-out/dist/${EXPECTED_WHEEL}" ]; then
            echo "::error::Expected wheel not found: wheel-out/dist/${EXPECTED_WHEEL}"
            exit 1
          fi
          ls -la wheel-out/dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: aiperf-wheel
          path: wheel-out/dist/*.whl
          retention-days: 30

  validate-wheel:
    name: Validate Wheel
    needs: [prepare-release, build-wheel]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validation tools
        run: pip install --upgrade pip twine

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: aiperf-wheel
          path: dist/

      - name: Run twine check
        run: twine check dist/*.whl

      - name: Validate license metadata
        run: |
          set -euo pipefail
          WHEEL=$(ls dist/*.whl)
          python -m zipfile -l "${WHEEL}" | grep -i license || {
            echo "::warning::No LICENSE file found in wheel"
          }

      - name: Smoke test import
        run: |
          pip install dist/*.whl
          python -c "import aiperf; print(f'aiperf version: {aiperf.__version__}')"
          aiperf --help

  build-container:
    name: Build Container (${{ matrix.arch }})
    needs: [prepare-release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: prod-aiperf-builder-amd-v1
          - arch: arm64
            platform: linux/arm64
            runner: prod-aiperf-builder-arm-v1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Patch version for RC
        uses: ./.github/actions/update-pyproject-version
        with:
          version: ${{ needs.prepare-release.outputs.pep440_version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export runtime image
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --target runtime \
            --cache-from type=gha,scope=${{ matrix.arch }} \
            --cache-to type=gha,mode=max,scope=${{ matrix.arch }} \
            --output type=oci,dest=aiperf-${{ matrix.arch }}.tar \
            .

      - name: Upload container artifact
        uses: actions/upload-artifact@v4
        with:
          name: aiperf-container-${{ matrix.arch }}
          path: aiperf-${{ matrix.arch }}.tar
          retention-days: 7

  # ============================================================================
  # TAG
  # ============================================================================

  create-rc-tag:
    name: Create RC Tag
    needs:
      - prepare-release
      - pre-commit
      - unit-tests
      - integration-tests
      - gpu-e2e-tests
      - validate-wheel
      - build-container
    runs-on: ubuntu-latest
    environment: automated-release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push RC tag
        env:
          RC_TAG: ${{ needs.prepare-release.outputs.rc_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${RC_TAG}" -m "Release candidate ${RC_TAG}"
          git push origin "${RC_TAG}"

      - name: Release summary
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
          RC_TAG: ${{ needs.prepare-release.outputs.rc_tag }}
          RC_NUMBER: ${{ needs.prepare-release.outputs.rc_number }}
          PEP440_VERSION: ${{ needs.prepare-release.outputs.pep440_version }}
          WHEEL_FILENAME: ${{ needs.prepare-release.outputs.wheel_filename }}
          GPU_TEST_RESULT: ${{ needs.gpu-e2e-tests.result }}
        run: |
          {
            echo "## RC Release Summary"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Version | ${VERSION} |"
            echo "| RC Number | ${RC_NUMBER} |"
            echo "| Git Tag | \`${RC_TAG}\` |"
            echo "| PEP 440 Version | \`${PEP440_VERSION}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Wheel | \`${WHEEL_FILENAME}\` |"
            echo ""
            echo "### Quality Gates"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Pre-commit | ${{ needs.pre-commit.result }} |"
            echo "| Unit Tests | ${{ needs.unit-tests.result }} |"
            echo "| Integration Tests | ${{ needs.integration-tests.result }} |"
            echo "| GPU E2E Tests | ${GPU_TEST_RESULT} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # STAGE ARTIFACTS
  # ============================================================================

  stage-container:
    name: Stage Container
    needs: [prepare-release, create-rc-tag]
    runs-on: prod-aiperf-default-v1
    environment: automated-release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute image references
        id: refs
        env:
          PEP440_VERSION: ${{ needs.prepare-release.outputs.pep440_version }}
          REGISTRY: ${{ secrets.RC_CONTAINER_REGISTRY }}
        run: |
          set -euo pipefail
          IMAGE="${REGISTRY}/aiperf"
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "amd64_ref=${IMAGE}:${PEP440_VERSION}-amd64" >> "$GITHUB_OUTPUT"
          echo "arm64_ref=${IMAGE}:${PEP440_VERSION}-arm64" >> "$GITHUB_OUTPUT"
          echo "multiarch_ref=${IMAGE}:${PEP440_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.RC_CONTAINER_REGISTRY }}
          username: ${{ secrets.RC_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.RC_CONTAINER_REGISTRY_PASSWORD }}

      - name: Download amd64 container artifact
        uses: actions/download-artifact@v4
        with:
          name: aiperf-container-amd64
          path: artifacts/

      - name: Download arm64 container artifact
        uses: actions/download-artifact@v4
        with:
          name: aiperf-container-arm64
          path: artifacts/

      - name: Push amd64 image
        env:
          IMAGE_REF: ${{ steps.refs.outputs.amd64_ref }}
        run: |
          skopeo copy \
            oci-archive:artifacts/aiperf-amd64.tar \
            "docker://${IMAGE_REF}"

      - name: Push arm64 image
        env:
          IMAGE_REF: ${{ steps.refs.outputs.arm64_ref }}
        run: |
          skopeo copy \
            oci-archive:artifacts/aiperf-arm64.tar \
            "docker://${IMAGE_REF}"

      - name: Create and push multi-arch manifest
        uses: ./.github/actions/create-multiarch-manifest
        with:
          registry: ${{ steps.refs.outputs.registry }}
          registry-username: ${{ secrets.RC_CONTAINER_REGISTRY_USERNAME }}
          registry-password: ${{ secrets.RC_CONTAINER_REGISTRY_PASSWORD }}
          target-image: ${{ steps.refs.outputs.multiarch_ref }}
          source-images: >-
            ${{ steps.refs.outputs.amd64_ref }}
            ${{ steps.refs.outputs.arm64_ref }}

      - name: Logout from container registry
        if: always()
        env:
          REGISTRY: ${{ steps.refs.outputs.registry }}
        run: |
          docker logout "${REGISTRY}" 2>/dev/null || true
          skopeo logout "${REGISTRY}" 2>/dev/null || true

  stage-wheel:
    name: Stage Wheel
    needs: [prepare-release, create-rc-tag, validate-wheel]
    runs-on: prod-aiperf-default-v1
    environment: automated-release
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: aiperf-wheel
          path: dist/

      - name: Publish wheel to Artifactory
        env:
          ARTIFACTORY_URL: ${{ secrets.ARTIFACTORY_URL }}
          ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
          TWINE_NON_INTERACTIVE: "1"
          PEP440_VERSION: ${{ needs.prepare-release.outputs.pep440_version }}
        run: |
          set -euo pipefail
          uvx twine upload \
            --repository-url "${ARTIFACTORY_URL}" \
            --username "${ARTIFACTORY_USER}" \
            --password "${ARTIFACTORY_TOKEN}" \
            --disable-progress-bar \
            dist/*.whl
          {
            echo "### Artifactory Upload"
            echo "- **Repository**: \`${ARTIFACTORY_URL}\`"
            echo "- **Package**: \`aiperf==${PEP440_VERSION}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # REGISTER WITH NSPECT
  # ============================================================================

  register-nspect:
    name: Register RC in nSpect
    needs: [prepare-release, stage-container, stage-wheel]
    runs-on: prod-aiperf-default-v1
    environment: automated-release
    steps:
      - name: Obtain SSA bearer token
        id: token
        env:
          NSPECT_SSA_CLIENT_ID: ${{ secrets.NSPECT_SSA_CLIENT_ID }}
          NSPECT_SSA_CLIENT_SECRET: ${{ secrets.NSPECT_SSA_CLIENT_SECRET }}
          SSA_TOKEN_URL: ${{ secrets.NSPECT_SSA_TOKEN_URL }}
        run: |
          set -euo pipefail
          BASIC_AUTH=$(echo -n "${NSPECT_SSA_CLIENT_ID}:${NSPECT_SSA_CLIENT_SECRET}" | base64 -w0)
          TOKEN_RESPONSE=$(curl -sf --request POST \
            "${SSA_TOKEN_URL}" \
            --header "Authorization: Basic ${BASIC_AUTH}" \
            --header 'Content-Type: application/x-www-form-urlencoded' \
            --data-urlencode 'grant_type=client_credentials' \
            --data-urlencode 'scope=public.api:read public.api:write')
          ACCESS_TOKEN=$(echo "${TOKEN_RESPONSE}" | jq -r '.access_token')
          if [ -z "${ACCESS_TOKEN}" ] || [ "${ACCESS_TOKEN}" = "null" ]; then
            echo "::error::Failed to obtain nSpect SSA token"
            exit 1
          fi
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "access_token=${ACCESS_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Register program version in nSpect
        id: register
        env:
          ACCESS_TOKEN: ${{ steps.token.outputs.access_token }}
          NSPECT_ID: ${{ secrets.NSPECT_ID }}
          NSPECT_API_URL: ${{ secrets.NSPECT_API_URL }}
          PEP440_VERSION: ${{ needs.prepare-release.outputs.pep440_version }}
          RC_TAG: ${{ needs.prepare-release.outputs.rc_tag }}
          WHEEL_FILENAME: ${{ needs.prepare-release.outputs.wheel_filename }}
          ARTIFACTORY_PYPI_URL: ${{ secrets.ARTIFACTORY_PYPI_URL }}
          CONTAINER_IMAGE_BASE: ${{ secrets.NSPECT_CONTAINER_IMAGE_BASE }}
        run: |
          set -euo pipefail
          RELEASE_DATE=$(date -u '+%Y-%m-%d %H:%M:%S')
          WHEEL_URL="${ARTIFACTORY_PYPI_URL}/aiperf/${PEP440_VERSION}/${WHEEL_FILENAME}"
          CONTAINER_TAG="${CONTAINER_IMAGE_BASE}:${PEP440_VERSION}"

          PAYLOAD=$(jq -n \
            --arg version "${PEP440_VERSION}" \
            --arg desc "Release candidate ${RC_TAG}" \
            --arg date "${RELEASE_DATE}" \
            --arg wheel_url "${WHEEL_URL}" \
            --arg container "${CONTAINER_TAG}" \
            '{
              request: {
                versionName: $version,
                description: $desc,
                releaseType_id: 2,
                releaseDate: $date,
                binaryArtifacts: [
                  { sourcePointer: $wheel_url }
                ],
                containerImages: [
                  { imageUrl: $container }
                ]
              }
            }')

          RESPONSE=$(curl -sf --request POST \
            "${NSPECT_API_URL}/pm/api/v1.0/public/programs/${NSPECT_ID}/programVersions" \
            --header 'Content-Type: application/json' \
            --header "Authorization: Bearer ${ACCESS_TOKEN}" \
            --data "${PAYLOAD}")

          echo "nSpect response: ${RESPONSE}"
          SUCCESS=$(echo "${RESPONSE}" | jq -r '.success')
          if [ "${SUCCESS}" != "true" ]; then
            echo "::error::nSpect registration failed: ${RESPONSE}"
            exit 1
          fi

          STATUS_URL=$(echo "${RESPONSE}" | jq -r '.data.status_url // empty')
          echo "status_url=${STATUS_URL}" >> "$GITHUB_OUTPUT"

      - name: Poll nSpect job status
        if: steps.register.outputs.status_url != ''
        env:
          ACCESS_TOKEN: ${{ steps.token.outputs.access_token }}
          NSPECT_API_URL: ${{ secrets.NSPECT_API_URL }}
          STATUS_URL: ${{ steps.register.outputs.status_url }}
        run: |
          set -euo pipefail
          for i in $(seq 1 12); do
            sleep 10
            RESULT=$(curl -sf \
              "${NSPECT_API_URL}/${STATUS_URL}" \
              --header "Authorization: Bearer ${ACCESS_TOKEN}")
            STATUS=$(echo "${RESULT}" | jq -r '.data.job.status')
            echo "Poll ${i}: status=${STATUS}"
            if [ "${STATUS}" = "SUCCESS" ]; then
              echo "nSpect registration completed successfully"
              break
            elif [ "${STATUS}" = "FAILURE" ] || [ "${STATUS}" = "ERROR" ]; then
              echo "::error::nSpect job failed: ${RESULT}"
              exit 1
            fi
          done

      - name: nSpect summary
        env:
          NSPECT_ID: ${{ secrets.NSPECT_ID }}
          PEP440_VERSION: ${{ needs.prepare-release.outputs.pep440_version }}
          WHEEL_FILENAME: ${{ needs.prepare-release.outputs.wheel_filename }}
          CONTAINER_IMAGE_BASE: ${{ secrets.NSPECT_CONTAINER_IMAGE_BASE }}
        run: |
          {
            echo "### nSpect Registration"
            echo "- **nSpect ID**: \`${NSPECT_ID}\`"
            echo "- **Version**: \`${PEP440_VERSION}\`"
            echo "- **Release Type**: Internal"
            echo "- **Wheel**: \`${WHEEL_FILENAME}\`"
            echo "- **Container**: \`${CONTAINER_IMAGE_BASE}:${PEP440_VERSION}\`"
            echo "- **Status**: Registered"
          } >> "$GITHUB_STEP_SUMMARY"
