name: Release Metadata
description: >
  Extract version from branch name, compute PEP 440 RC version,
  and generate container image tags / wheel filenames for an RC release.

inputs:
  branch_name:
    description: 'Release branch name (e.g. release/0.6.0)'
    required: true
  rc_number:
    description: 'RC number (zero-indexed integer)'
    required: true
  container_registry:
    description: 'Container registry hostname'
    required: true
  container_repository:
    description: 'Container repository name within the registry'
    required: false
    default: 'aiperf'

outputs:
  base_version:
    description: 'Base semver version extracted from branch (e.g. 0.6.0)'
    value: ${{ steps.compute.outputs.base_version }}
  pep440_version:
    description: 'PEP 440 RC version (e.g. 0.6.0rc0)'
    value: ${{ steps.compute.outputs.pep440_version }}
  rc_tag:
    description: 'Git RC tag (e.g. v0.6.0-rc0)'
    value: ${{ steps.compute.outputs.rc_tag }}
  wheel_filename:
    description: 'Expected wheel filename'
    value: ${{ steps.compute.outputs.wheel_filename }}
  container_image:
    description: 'Full container image path without tag'
    value: ${{ steps.compute.outputs.container_image }}
  container_platform_amd64_tag:
    description: 'Container tag for the amd64 platform image'
    value: ${{ steps.compute.outputs.container_platform_amd64_tag }}
  container_platform_arm64_tag:
    description: 'Container tag for the arm64 platform image'
    value: ${{ steps.compute.outputs.container_platform_arm64_tag }}
  container_platform_amd64_ref:
    description: 'Full image reference for amd64'
    value: ${{ steps.compute.outputs.container_platform_amd64_ref }}
  container_platform_arm64_ref:
    description: 'Full image reference for arm64'
    value: ${{ steps.compute.outputs.container_platform_arm64_ref }}
  container_multiarch_tag:
    description: 'Container tag for the multi-arch manifest'
    value: ${{ steps.compute.outputs.container_multiarch_tag }}
  container_multiarch_ref:
    description: 'Full image reference for multi-arch manifest'
    value: ${{ steps.compute.outputs.container_multiarch_ref }}

runs:
  using: composite
  steps:
    - name: Compute release metadata
      id: compute
      shell: bash
      env:
        BRANCH_NAME: ${{ inputs.branch_name }}
        RC_NUMBER: ${{ inputs.rc_number }}
        CONTAINER_REGISTRY: ${{ inputs.container_registry }}
        CONTAINER_REPOSITORY: ${{ inputs.container_repository }}
      run: |
        set -euo pipefail

        # Extract version from branch name (release/X.Y.Z -> X.Y.Z)
        BASE_VERSION="${BRANCH_NAME#release/}"

        if [[ ! "${BASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::Invalid version '${BASE_VERSION}' from branch '${BRANCH_NAME}'. Expected X.Y.Z."
          exit 1
        fi

        if [[ ! "${RC_NUMBER}" =~ ^[0-9]+$ ]]; then
          echo "::error::Invalid RC number '${RC_NUMBER}'. Expected a non-negative integer."
          exit 1
        fi

        PEP440_VERSION="${BASE_VERSION}rc${RC_NUMBER}"
        RC_TAG="v${BASE_VERSION}-rc${RC_NUMBER}"
        WHEEL_FILENAME="aiperf-${PEP440_VERSION}-py3-none-any.whl"

        IMAGE="${CONTAINER_REGISTRY}/${CONTAINER_REPOSITORY}"
        MULTIARCH_TAG="${PEP440_VERSION}"
        AMD64_TAG="${PEP440_VERSION}-amd64"
        ARM64_TAG="${PEP440_VERSION}-arm64"

        {
          echo "base_version=${BASE_VERSION}"
          echo "pep440_version=${PEP440_VERSION}"
          echo "rc_tag=${RC_TAG}"
          echo "wheel_filename=${WHEEL_FILENAME}"
          echo "container_image=${IMAGE}"
          echo "container_platform_amd64_tag=${AMD64_TAG}"
          echo "container_platform_arm64_tag=${ARM64_TAG}"
          echo "container_platform_amd64_ref=${IMAGE}:${AMD64_TAG}"
          echo "container_platform_arm64_ref=${IMAGE}:${ARM64_TAG}"
          echo "container_multiarch_tag=${MULTIARCH_TAG}"
          echo "container_multiarch_ref=${IMAGE}:${MULTIARCH_TAG}"
        } >> "$GITHUB_OUTPUT"

        echo "### Release Metadata" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Base version**: ${BASE_VERSION}" >> "$GITHUB_STEP_SUMMARY"
        echo "- **PEP 440 version**: ${PEP440_VERSION}" >> "$GITHUB_STEP_SUMMARY"
        echo "- **RC tag**: ${RC_TAG}" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Wheel**: ${WHEEL_FILENAME}" >> "$GITHUB_STEP_SUMMARY"
