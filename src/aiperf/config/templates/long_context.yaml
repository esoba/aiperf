# yaml-language-server: $schema=../schema/aiperf-config.schema.json
# @template
# title: Long Context Benchmark (32K+)
# description: Test performance with long input contexts and prefill concurrency limits.
# category: Advanced
# tags: long-context, prefill, memory
# difficulty: intermediate
# features: prefill_concurrency, long ISL, concurrency ramp
#
# Long Context Benchmark
# ======================
# Tests model performance with long input contexts (32K+ tokens).
# Uses prefill concurrency limits to prevent memory exhaustion.
#
# Use case: Benchmark RAG systems, document analysis, or code completion
#
# Run: aiperf profile --config long_context.yaml

randomSeed: 42

model: meta-llama/Llama-3.1-70B-Instruct

endpoint:
  url: http://localhost:8000/v1/chat/completions
  type: chat
  streaming: true
  timeout: 600.0  # Long timeout for large context

datasets:
  # 32K context length test
  long_32k:
    type: synthetic
    entries: 100
    prompts:
      isl: {mean: 32000, stddev: 2000}
      osl: {mean: 512, stddev: 100}

  # 64K context length test
  long_64k:
    type: synthetic
    entries: 50
    prompts:
      isl: {mean: 64000, stddev: 4000}
      osl: {mean: 256, stddev: 50}

  # Mixed context lengths (realistic RAG distribution)
  mixed_context:
    type: synthetic
    entries: 500
    prompts:
      sequenceDistribution:
        - {isl: 2048, osl: 256, probability: 30}   # Short queries
        - {isl: 8192, osl: 512, probability: 35}   # Medium documents
        - {isl: 32000, osl: 512, probability: 25}  # Long documents
        - {isl: 64000, osl: 256, probability: 10}  # Very long documents


phases:
  # Warmup with shorter contexts
  warmup:
    type: concurrency
    dataset: mixed_context
    excludeFromResults: true
    requests: 20
    concurrency: 4
    prefillConcurrency: 2

  # Mixed context test
  mixed_context_test:
    type: poisson
    dataset: mixed_context
    requests: 500
    concurrency: 20
    prefillConcurrency: 5  # Limit concurrent prefills to prevent OOM
    prefillRamp: 30  # Ramp prefill concurrency over 30s
    rate: 5.0
    duration: 600
    gracePeriod: 300

  # 32K dedicated test
  long_32k_test:
    type: constant
    dataset: long_32k
    requests: 100
    concurrency: 10
    prefillConcurrency: 3
    rate: 1.0  # Low rate for long contexts
    seamless: true
    duration: 600
    gracePeriod: 300

artifacts:
  dir: ./artifacts/long_context
  summary: [json]
  records: [jsonl, csv]
  sliceDuration: 60

# Monitor GPU memory usage
gpuTelemetry:
  enabled: true
  urls:
    - http://localhost:9400/metrics

serverMetrics:
  enabled: true
  urls:
    - http://localhost:8000/metrics
  formats: [json, csv]
