# yaml-language-server: $schema=../schema/aiperf-config.schema.json
# @template
# title: Goodput / SLO Benchmark
# description: Measure good requests/sec that meet latency SLO thresholds at multiple load levels.
# category: Load Testing
# tags: goodput, slo, latency, multi-phase
# difficulty: intermediate
# features: SLOs, multi-phase, poisson arrival, slice_duration
#
# Goodput / SLO Benchmark
# =======================
# Measures "good" requests per second that meet all SLO thresholds.
# A request is "good" only if it meets ALL specified SLO criteria.
#
# Use case: Find maximum sustainable throughput while meeting latency SLAs
#
# Reference: DistServe paper (https://arxiv.org/pdf/2401.09670)
#
# Run: aiperf profile --config goodput_slo.yaml

random_seed: 42

model: meta-llama/Llama-3.1-8B-Instruct

endpoint:
  url: http://localhost:8000
  path: /v1/chat/completions
  type: chat
  streaming: true  # Required for TTFT and ITL measurement
  timeout: 120.0

dataset:
  type: synthetic
  entries: 5000
  prompts:
    isl: {mean: 512, stddev: 100}
    osl: {mean: 256, stddev: 50}


phases:
  # Warmup
  warmup:
    type: concurrency
    exclude_from_results: true
    requests: 100
    concurrency: 16

  # Goodput measurement at low load
  low_load:
    type: poisson
    duration: 120
    rate: 10.0
    concurrency: 50
    seamless: true
    grace_period: 60

  # Goodput measurement at medium load
  medium_load:
    type: poisson
    duration: 120
    rate: 30.0
    concurrency: 100
    seamless: true
    grace_period: 60

  # Goodput measurement at high load
  high_load:
    type: poisson
    duration: 120
    rate: 50.0
    concurrency: 150
    seamless: true
    grace_period: 60

# SLO definitions - request is "good" if ALL thresholds are met
slos:
  request_latency: 5000  # Max 5 seconds E2E latency (ms)
  time_to_first_token: 500  # Max 500ms TTFT
  inter_token_latency: 50  # Max 50ms between tokens
  tokens_per_second: 20.0  # Min 20 tokens/sec output rate

artifacts:
  dir: ./artifacts/goodput_slo
  summary: [json]
  records: [jsonl, csv]
  slice_duration: 30
