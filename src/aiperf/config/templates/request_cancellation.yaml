#
# Request Cancellation Test
# =========================
# Tests server behavior when clients cancel requests mid-flight.
# Useful for understanding resource cleanup and scheduling behavior.
#
# Use case: Validate server handles cancellations gracefully
#
# Run: aiperf --config templates/request_cancellation.yaml

random_seed: 42

models:
  - meta-llama/Llama-3.1-8B-Instruct

endpoint:
  urls:
    - http://localhost:8000/v1/chat/completions
  type: chat
  streaming: true
  timeout: 120.0

datasets:
  cancellation_test:
    type: synthetic
    entries: 1000
    prompts:
      isl: {mean: 512, stddev: 100}
      osl: {mean: 512, stddev: 100}  # Long output for cancellation window


load:
  # Baseline without cancellation
  baseline:
    type: poisson
    requests: 500
    concurrency: 32
    rate: 20.0
    grace_period: 60

  # 10% cancellation after 0.5 seconds
  cancel_10_percent:
    type: poisson
    requests: 500
    concurrency: 32
    rate: 20.0
    cancellation:
      rate: 10.0  # Cancel 10% of requests
      delay: 0.5  # Wait 0.5 seconds before cancelling
    seamless: true
    grace_period: 60

  # 25% cancellation (immediate)
  cancel_25_percent_immediate:
    type: poisson
    requests: 500
    concurrency: 32
    rate: 20.0
    cancellation:
      rate: 25.0
      delay: 0.0  # Cancel immediately
    seamless: true
    grace_period: 60

artifacts:
  dir: ./artifacts/request_cancellation
  console: table
  summary: [json]
  records: [jsonl, csv]

server_metrics:
  enabled: true
  urls:
    - http://localhost:8000/metrics
  formats: [json, csv]
