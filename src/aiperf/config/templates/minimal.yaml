# Minimal Configuration
# =====================
# Absolute bare minimum using all shorthand forms.
#
# Run: aiperf profile --config minimal.yaml

model: meta-llama/Llama-3.1-8B-Instruct

endpoint:
  url: http://localhost:8000

dataset:
  type: synthetic
  entries: 100
  prompts:
    isl: 512
    osl: 128

phases:
  type: concurrency
  concurrency: 8
  requests: 100
