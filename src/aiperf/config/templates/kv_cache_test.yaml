# yaml-language-server: $schema=../schema/aiperf-config.schema.json
# @template
# title: KV Cache / Prefix Caching
# description: Test KV cache efficiency with shared system prompts using user-centric mode.
# category: Advanced
# tags: kv-cache, prefix, user-centric
# difficulty: advanced
# features: user_centric mode, shared prefix, per-user rate
#
# KV Cache / Prefix Caching Benchmark
# ====================================
# Measures how well the server reuses cached KV states for shared prefixes.
# Servers like vLLM and TRT-LLM can cache the KV computation for system
# prompts and shared context, serving subsequent requests faster.
#
# Two approaches to prefix caching:
#
#   Prefix Pool (poolSize + length)
#     N distinct prefixes randomly assigned to requests. High cache hit
#     rate when poolSize is small relative to entries. Good for testing
#     system prompt caching in multi-tenant deployments.
#
#   Two-Part Prefix (sharedSystemLength + userContextLength)
#     A single system prompt shared by ALL requests (high cache hit) plus
#     a per-session user context (low cache hit). Models RAG pipelines
#     where the system prompt is fixed but retrieved context varies.
#
# Check server metrics for cache hit rates (vLLM: vllm:prefix_cache_hit_rate,
# TRT-LLM: kv_cache_reuse_rate) to validate caching is working.
#
# Run: aiperf profile --config kv_cache_test.yaml

randomSeed: 42

model: meta-llama/Llama-3.1-8B-Instruct

endpoint:
  url: http://localhost:8000/v1/chat/completions
  type: chat
  streaming: true
  timeout: 120.0

datasets:
  # Approach 1: Random selection from a small prefix pool
  prefix_pool:
    type: synthetic
    entries: 1000
    prompts:
      isl: {mean: 256, stddev: 30}
      osl: {mean: 128, stddev: 20}
    prefixPrompts:
      poolSize: 10   # 10 distinct prefixes — expect ~10% unique, ~90% cache hits
      length: 512    # Each prefix is 512 tokens

  # Approach 2: Shared system prompt + per-user context
  system_context:
    type: synthetic
    entries: 1000
    prompts:
      isl: {mean: 200, stddev: 25}
      osl: {mean: 150, stddev: 30}
    prefixPrompts:
      sharedSystemLength: 1000  # Same 1000-token system prompt for everyone
      userContextLength: 256    # Unique 256-token context per session

phases:
  prefix_pool_test:
    type: user_centric
    dataset: prefix_pool
    duration: 120
    users: 30         # 30 simulated users sharing the global rate
    rate: 2.0         # 2 QPS total (each user sends ~0.067 QPS)
    gracePeriod: 60

  system_context_test:
    type: user_centric
    dataset: system_context
    duration: 120
    users: 30
    rate: 2.0
    seamless: true
    gracePeriod: 60

artifacts:
  dir: ./artifacts/kv_cache_test
  summary: [json]
  records: [jsonl, csv]
  sliceDuration: 30  # Watch for cache warm-up — early slices should be slower

serverMetrics:
  enabled: true
  urls:
    - http://localhost:8000/metrics
  formats: [json, csv]
