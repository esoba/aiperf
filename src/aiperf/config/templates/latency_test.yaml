# yaml-language-server: $schema=../schema/aiperf-config.schema.json
# @template
# title: Latency Test (Controlled QPS)
# description: Measure TTFT, ITL, and E2E latency at a controlled request rate.
# category: Load Testing
# tags: latency, poisson, ttft, itl
# difficulty: beginner
# features: poisson arrival, streaming, latency metrics
#
# Latency Test with Controlled Request Rate
# ==========================================
# Measures latency characteristics (TTFT, ITL, E2E) at a controlled QPS.
# Uses Poisson arrival pattern for realistic traffic simulation.
#
# Use case: Measure P50/P90/P99 latencies at production-like request rates
#
# Run: aiperf profile --config latency_test.yaml

random_seed: 42

model: meta-llama/Llama-3.1-8B-Instruct

endpoint:
  url: http://localhost:8000/v1/chat/completions
  type: chat
  streaming: true
  timeout: 600.0

dataset:
  type: synthetic
  entries: 3000
  isl: {mean: 256, stddev: 50}
  osl: {mean: 128, stddev: 25}

profiling:
  type: poisson
  duration: 120  # 2 minutes
  rate: 20.0  # 20 requests per second
  concurrency: 100  # Upper limit to prevent queue buildup
  grace_period: 60

artifacts:
  dir: ./artifacts/latency_test
  summary: [json]
  records: [jsonl, csv]
  slice_duration: 30  # 30-second time windows for trend analysis
