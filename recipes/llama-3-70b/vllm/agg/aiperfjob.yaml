---
apiVersion: aiperf.nvidia.com/v1alpha1
kind: AIPerfJob
metadata:
  name: llama3-70b-agg-perf
spec:
  userConfig:
    endpoint:
      model_names:
        - RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic
      urls:
        - http://llama3-70b-agg-frontend:8000
      type: chat
      custom_endpoint: /v1/chat/completions
      streaming: true
    tokenizer:
      name: RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic
    loadgen:
      concurrency: 64
      request_count: 640
      warmup_request_count: 64
    input:
      prompt:
        input_tokens:
          mean: 8192
          stddev: 0
        output_tokens:
          mean: 1024
          stddev: 0
      extra:
        max_tokens: 1024
        min_tokens: 1024
        ignore_eos: true
        repetition_penalty: 1.0
        temperature: 0.0
        nvext:
          ignore_eos: true
      headers:
        Authorization: "Bearer NOT USED"
        Accept: text/event-stream
      random_seed: 100
      conversation:
        num_dataset_entries: 12800
  podTemplate:
    imagePullSecrets:
      - nvcrimagepullsecret
    env:
      - name: AIPERF_HTTP_CONNECTION_LIMIT
        value: "200"
    volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache
    volumeMounts:
      - name: model-cache
        mountPath: /root/.cache/huggingface
