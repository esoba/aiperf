#
# Single-turn benchmark for Qwen3-VL-30B with embedding cache.
#
# Prerequisites:
#   - DGD deployed and in "normal" or "successful" state
#   - perf-cache PVC with dataset at /perf-cache/datasets/qwen3_vl_1000req_1img_pool200.jsonl
#
---
apiVersion: aiperf.nvidia.com/v1alpha1
kind: AIPerfJob
metadata:
  name: qwen3-vl-agg-benchmark
spec:
  models:
    - Qwen/Qwen3-VL-30B-A3B-Instruct-FP8
  endpoint:
    urls:
      - http://qwen3-vl-agg-frontend:8000
    streaming: true
    extra:
      max_tokens: 150
      min_tokens: 150
      ignore_eos: true
  datasets:
    main:
      type: file
      path: /perf-cache/datasets/qwen3_vl_1000req_1img_pool200.jsonl
      format: single_turn
  load:
    warmup:
      type: concurrency
      dataset: main
      exclude: true
      concurrency: 64
      requests: 3
    profiling:
      type: concurrency
      dataset: main
      concurrency: 64
      requests: 1000
  podTemplate:
    volumes:
      - name: perf-cache
        persistentVolumeClaim:
          claimName: perf-cache
    volumeMounts:
      - name: perf-cache
        mountPath: /perf-cache
