#
# Mooncake trace-replay benchmark for Qwen3-32B (agg-round-robin).
# Downloads the Mooncake conversation trace and replays at original timestamps.
#
# Prerequisites:
#   - DGD deployed and in "normal" or "successful" state
#   - perf-cache PVC with Mooncake trace at /perf-cache/traces/conversation_trace.jsonl
#
---
apiVersion: aiperf.nvidia.com/v1alpha1
kind: AIPerfJob
metadata:
  name: agg-8xtp2-benchmark
spec:
  userConfig:
    endpoint:
      model_names:
        - Qwen/Qwen3-32B
      urls:
        - http://agg-8xtp2-frontend:8000
      streaming: true
    input:
      file: /perf-cache/traces/conversation_trace.jsonl
      custom_dataset_type: mooncake_trace
      fixed_schedule: true
      goodput:
        time_to_first_token: 2000
        inter_token_latency: 25
  podTemplate:
    volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache
      - name: perf-cache
        persistentVolumeClaim:
          claimName: perf-cache
    volumeMounts:
      - name: model-cache
        mountPath: /home/dynamo/.cache/huggingface
      - name: perf-cache
        mountPath: /perf-cache
