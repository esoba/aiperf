---
apiVersion: aiperf.nvidia.com/v1alpha1
kind: AIPerfJob
metadata:
  name: qwen3-235b-a22b-bench
spec:
  models:
    - Qwen/Qwen3-235B-A22B-FP8
  endpoint:
    urls:
      - http://qwen3-235b-a22b-agg-frontend:8000
    type: chat
    path: /v1/chat/completions
    streaming: true
    extra:
      max_tokens: 200
      min_tokens: 200
      ignore_eos: true
      repetition_penalty: 1.0
      temperature: 0.0
      nvext:
        ignore_eos: true
    headers:
      Authorization: "Bearer NOT USED"
      Accept: text/event-stream
  datasets:
    main:
      type: synthetic
      entries: 12800
      random_seed: 100
      prompts:
        isl: {mean: 4000, stddev: 0}
        osl: {mean: 200, stddev: 0}
  load:
    warmup:
      type: concurrency
      dataset: main
      exclude: true
      concurrency: 32
      requests: 32
    profiling:
      type: concurrency
      dataset: main
      concurrency: 32
      requests: 320
  podTemplate:
    imagePullSecrets:
      - nvcrimagepullsecret
    env:
      - name: AIPERF_HTTP_CONNECTION_LIMIT
        value: "200"
    volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache
    volumeMounts:
      - name: model-cache
        mountPath: /model-cache
