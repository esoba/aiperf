---
apiVersion: aiperf.nvidia.com/v1alpha1
kind: AIPerfJob
metadata:
  name: qwen3-32b-fp8-disagg-bench
spec:
  userConfig:
    endpoint:
      model_names:
        - Qwen/Qwen3-32B-FP8
      urls:
        - http://qwen3-32b-fp8-disagg-frontend:8000
      type: chat
      custom_endpoint: /v1/chat/completions
      streaming: true
    tokenizer:
      name: Qwen/Qwen3-32B-FP8
    loadgen:
      concurrency: 48
      request_count: 480
      warmup_request_count: 48
    input:
      prompt:
        input_tokens:
          mean: 4000
          stddev: 0
        output_tokens:
          mean: 500
          stddev: 0
      extra:
        max_tokens: 500
        min_tokens: 500
        ignore_eos: true
        repetition_penalty: 1.0
        temperature: 0.0
        nvext:
          ignore_eos: true
      headers:
        Authorization: "Bearer NOT USED"
        Accept: text/event-stream
      random_seed: 100
      conversation:
        num_dataset_entries: 12800
  podTemplate:
    imagePullSecrets:
      - nvcrimagepullsecret
    env:
      - name: AIPERF_HTTP_CONNECTION_LIMIT
        value: "200"
    volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache
    volumeMounts:
      - name: model-cache
        mountPath: /model-cache
