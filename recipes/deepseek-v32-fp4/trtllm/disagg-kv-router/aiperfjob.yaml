#
# Trace-replay benchmark for DeepSeek-V3.2 NVFP4 (disagg-kv-router).
# Replays requests from a Mooncake-format trace file at original timestamps.
#
# Prerequisites:
#   - DGD deployed and in "normal" or "successful" state
#   - model-cache PVC with trace file at /model-cache/traces/
#
---
apiVersion: aiperf.nvidia.com/v1alpha1
kind: AIPerfJob
metadata:
  name: disagg-kv-dsv32-nvfp4-bench
spec:
  models:
    - nvidia/DeepSeek-V3.2-NVFP4
  endpoint:
    urls:
      - http://disagg-kv-dsv32-nvfp4-frontend:8000
    streaming: true
    timeout: 1000
  datasets:
    main:
      type: file
      path: /model-cache/traces/conversation_trace_synth_16.00x1+10.00_speedup1_maxisl110000.jsonl
      format: mooncake_trace
      random_seed: 42
  slos:
    time_to_first_token: 20000
    inter_token_latency: 50
  load:
    warmup:
      type: concurrency
      dataset: main
      exclude: true
      concurrency: 4
      requests: 10
    profiling:
      type: fixed_schedule
      dataset: main
  artifacts:
    records: [jsonl]
  server_metrics:
    urls:
      - http://disagg-kv-dsv32-nvfp4-dec-0-dec-wkr:9090/metrics
      - http://disagg-kv-dsv32-nvfp4-prefill-0:9090/metrics
  podTemplate:
    env:
      - name: AIPERF_HTTP_CONNECTION_LIMIT
        value: "200"
      - name: AIPERF_HTTP_SO_RCVTIMEO
        value: "120"
    volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache
    volumeMounts:
      - name: model-cache
        mountPath: /model-cache
